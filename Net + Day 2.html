<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CompTIA Network+ Quiz – Cabling & Appliances (30 Questions)</title>

  <style>
    body {
      font-family: Segoe UI, Tahoma, Arial, sans-serif;
      background-color: #f3f4f6;
      margin: 0;
      padding: 0;
      color: #111827;
    }

    .container {
      max-width: 1000px;
      margin: 30px auto;
      background: #ffffff;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 20px 25px 30px;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      font-size: 26px;
      color: #111827;
    }

    h2 {
      font-size: 18px;
      color: #374151;
      text-align: center;
      margin-top: 5px;
      margin-bottom: 20px;
    }

    .meta {
      text-align: center;
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 15px;
    }

    button {
      border: none;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
      background-color: #2563eb;
      color: white;
      transition: background-color 0.15s ease, transform 0.05s ease;
    }

    button:hover {
      background-color: #1d4ed8;
    }

    button:active {
      transform: scale(0.97);
    }

    button.secondary {
      background-color: #6b7280;
    }

    button.secondary:hover {
      background-color: #4b5563;
    }

    .question-card {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 14px 14px 10px;
      margin-bottom: 14px;
      background-color: #f9fafb;
    }

    .question-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
    }

    .question-number {
      font-weight: 600;
      color: #374151;
    }

    .topic-tag {
      font-size: 11px;
      padding: 1px 7px;
      border-radius: 999px;
      background-color: #e5e7eb;
      color: #4b5563;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .question-text {
      margin-bottom: 8px;
      font-size: 14px;
    }

    .options {
      margin-bottom: 6px;
    }

    .option {
      margin-bottom: 4px;
      padding: 4px 6px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background-color 0.1s ease;
    }

    .option.correct-selected {
      background-color: #dcfce7;
    }

    .option.incorrect-selected {
      background-color: #fee2e2;
    }

    .option input {
      margin-right: 6px;
    }

    .letter-label {
      font-weight: bold;
      width: 40px;
      display: inline-block;
    }

    .feedback-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 4px;
    }

    .feedback {
      font-size: 13px;
      min-height: 18px;
    }

    .feedback.correct {
      color: #15803d;
    }

    .feedback.incorrect {
      color: #b91c1c;
    }

    .explanation {
      margin-top: 6px;
      font-size: 13px;
      color: #374151;
      background-color: #eff6ff;
      border-radius: 6px;
      padding: 6px 8px;
      display: none;
    }

    .explanation-toggle {
      font-size: 12px;
      background: #e5e7eb;
      color: #374151;
      padding: 3px 8px;
    }

    .score-box {
      text-align: center;
      font-size: 14px;
      margin-top: 10px;
      padding: 8px;
      border-radius: 8px;
      background-color: #eff6ff;
      color: #1d4ed8;
    }

    .score-box span {
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>CompTIA Network+ Practice Quiz</h1>
    <h2>Supporting Cabling, Physical Installations & Networking Appliances (30 Questions)</h2>

    <div class="meta">
      Questions and answers are randomized on each load.  
      Get instant feedback and explanations as you go.
    </div>

    <div class="controls">
      <button id="shuffleBtn">Shuffle Questions & Answers</button>
      <button id="gradeBtn" class="secondary">Grade Quiz</button>
      <button id="showAllExpBtn" class="secondary">Show All Explanations</button>
      <button id="hideAllExpBtn" class="secondary">Hide All Explanations</button>
    </div>

    <div id="quiz"></div>

    <div id="scoreBox" class="score-box" style="display:none;">
      Final Score: <span id="scoreText"></span>
    </div>
  </div>

  <script>
  document.addEventListener("DOMContentLoaded", function() {

    const questions = [
      {
        topic: "Cabling",
        question: "Which cable type is most appropriate for a 10 Gbps connection over 55 meters in an office environment?",
        options: ["Cat6", "Cat5e", "RG-6", "Cat3"],
        correctIndex: 0,
        explanation: "Cat6 supports 10GBASE-T up to 55 meters, making it suitable for short-range 10 Gbps links."
      },
      {
        topic: "Cabling",
        question: "A technician needs to run cable through an area with high EMI. Which cable type is the best choice?",
        options: ["Fiber optic", "Cat5e UTP", "Cat6 UTP", "RG-59"],
        correctIndex: 0,
        explanation: "Fiber is immune to electromagnetic interference, making it ideal for high-EMI environments."
      },
      {
        topic: "Cabling",
        question: "Which connector is used with multimode fiber?",
        options: ["LC", "RJ45", "BNC", "F-type"],
        correctIndex: 0,
        explanation: "LC is a common connector for multimode fiber installations."
      },
      {
        topic: "Cabling",
        question: "A run between two wiring closets is 120 meters. Which cable type is appropriate?",
        options: ["Single-mode fiber", "Cat6", "Cat5e", "RG-6"],
        correctIndex: 0,
        explanation: "Single-mode fiber supports long-distance runs well beyond 120 meters."
      },
      {
        topic: "Cabling",
        question: "Which tool is used to terminate wires into a patch panel?",
        options: ["Punchdown tool", "Crimper", "OTDR", "Tone generator"],
        correctIndex: 0,
        explanation: "Punchdown tools are used to seat wires into patch panel IDC terminals."
      },
      {
        topic: "Cabling",
        question: "A technician needs to verify the length and quality of a fiber run. Which tool should be used?",
        options: ["OTDR", "Multimeter", "Loopback plug", "Punchdown tool"],
        correctIndex: 0,
        explanation: "An OTDR measures fiber length, signal loss, and faults."
      },
      {
        topic: "Cabling",
        question: "Which wiring standard is most commonly used in the United States for Ethernet cabling?",
        options: ["T568B", "T568A", "RJ11", "SC"],
        correctIndex: 0,
        explanation: "T568B is the most widely used Ethernet wiring standard in the U.S."
      },
      {
        topic: "Cabling",
        question: "What is the maximum recommended length for a copper Ethernet horizontal run?",
        options: ["100 meters", "50 meters", "150 meters", "300 meters"],
        correctIndex: 0,
        explanation: "Ethernet copper runs are limited to 100 meters end-to-end."
      },
      {
        topic: "Cabling",
        question: "Which device is used to locate the opposite end of a cable in a building?",
        options: ["Tone generator and probe", "OTDR", "Crimper", "Loopback adapter"],
        correctIndex: 0,
        explanation: "A tone generator and probe help trace cable paths through walls and ceilings."
      },
      {
        topic: "Cabling",
        question: "A technician needs to test for split pairs in a copper cable. Which tool is required?",
        options: ["Cable certifier", "Punchdown tool", "Fiber light meter", "RJ45 coupler"],
        correctIndex: 0,
        explanation: "Cable certifiers detect wiring faults including split pairs."
      },
      {
        topic: "Installation",
        question: "Which type of ladder rack is used to support horizontal cable runs above ceiling tiles?",
        options: ["Cable tray", "Patch panel", "Riser", "Raceway"],
        correctIndex: 0,
        explanation: "Cable trays support horizontal cable bundles above ceilings."
      },
      {
        topic: "Installation",
        question: "What is the purpose of a plenum-rated cable?",
        options: ["To reduce toxic smoke in air-handling spaces", "To support higher bandwidth", "To prevent water intrusion", "To reduce crosstalk"],
        correctIndex: 0,
        explanation: "Plenum cable uses low-smoke materials for HVAC air-handling spaces."
      },
      {
        topic: "Installation",
        question: "Which component organizes and terminates horizontal cabling in a wiring closet?",
        options: ["Patch panel", "Repeater", "UPS", "Firewall"],
        correctIndex: 0,
        explanation: "Patch panels provide structured termination points for horizontal cabling."
      },
      {
        topic: "Installation",
        question: "Which device is used to protect network equipment from power fluctuations?",
        options: ["UPS", "Patch panel", "Repeater", "Load balancer"],
        correctIndex: 0,
        explanation: "A UPS provides clean, stable power and battery backup."
      },
      {
        topic: "Installation",
        question: "Which type of cable is required for in-wall residential or commercial installations?",
        options: ["Riser or plenum-rated", "Patch cable", "RG-59", "Direct burial"],
        correctIndex: 0,
        explanation: "In-wall installations require riser or plenum-rated cable depending on the environment."
      },
      {
        topic: "Installation",
        question: "A technician needs to route cables along a wall surface. Which product should be used?",
        options: ["Raceway", "Patch panel", "Cable tray", "Riser"],
        correctIndex: 0,
        explanation: "Raceways protect and conceal cables along walls."
      },
      {
        topic: "Installation",
        question: "Which device regenerates signals to extend cable distance?",
        options: ["Repeater", "Switch", "Firewall", "Load balancer"],
        correctIndex: 0,
        explanation: "Repeaters regenerate signals to extend cable runs."
      },
      {
        topic: "Installation",
        question: "Which standard defines telecommunications room cabling and pathways?",
        options: ["TIA-568", "IEEE 802.3", "ISO 9001", "RFC 1918"],
        correctIndex: 0,
        explanation: "TIA-568 defines structured cabling standards."
      },
      {
        topic: "Appliances",
        question: "Which device distributes incoming internet traffic across multiple servers?",
        options: ["Load balancer", "Firewall", "Switch", "Repeater"],
        correctIndex: 0,
        explanation: "Load balancers distribute traffic to improve performance and redundancy."
      },
      {
        topic: "Appliances",
        question: "Which appliance inspects traffic and blocks malicious activity?",
        options: ["Firewall", "Switch", "Patch panel", "Repeater"],
        correctIndex: 0,
        explanation: "Firewalls filter and inspect traffic for security."
      },
      {
        topic: "Appliances",
        question: "Which device caches frequently accessed web content to reduce bandwidth usage?",
        options: ["Proxy server", "Load balancer", "Repeater", "UPS"],
        correctIndex: 0,
        explanation: "Proxy servers can cache web content to improve performance."
      },
      {
        topic: "Appliances",
        question: "Which device aggregates multiple WAN connections for redundancy?",
        options: ["Router", "Switch", "Patch panel", "Repeater"],
        correctIndex: 0,
        explanation: "Routers manage WAN connections and routing decisions."
      },
      {
        topic: "Appliances",
        question: "Which appliance is used to detect and alert on suspicious network activity?",
        options: ["IDS", "Load balancer", "Repeater", "Patch panel"],
        correctIndex: 0,
        explanation: "IDS systems monitor traffic and alert on suspicious behavior."
      },
      {
        topic: "Appliances",
        question: "Which device both detects and blocks malicious traffic automatically?",
        options: ["IPS", "IDS", "Proxy", "Repeater"],
        correctIndex: 0,
        explanation: "IPS systems actively block malicious traffic."
      },
      {
        topic: "Appliances",
        question: "Which device provides secure remote access using encrypted tunnels?",
        options: ["VPN concentrator", "Switch", "Repeater", "Patch panel"],
        correctIndex: 0,
        explanation: "VPN concentrators manage encrypted remote access tunnels."
      },
      {
        topic: "Appliances",
        question: "Which device is used to connect multiple network segments and forward frames based on MAC addresses?",
        options: ["Switch", "Router", "Firewall", "Proxy"],
        correctIndex: 0,
        explanation: "Switches forward frames using MAC address tables."
      },
      {
        topic: "Appliances",
        question: "Which appliance filters traffic based on Layer 7 application data?",
        options: ["Next-generation firewall", "Repeater", "Patch panel", "Hub"],
        correctIndex: 0,
        explanation: "NGFWs inspect traffic at the application layer."
      },
      {
        topic: "Appliances",
        question: "Which device is used to connect legacy coaxial Ethernet segments?",
        options: ["Media converter", "Switch", "Firewall", "Load balancer"],
        correctIndex: 0,
        explanation: "Media converters allow different media types to interoperate."
      },
      {
        topic: "Appliances",
        question: "Which device isolates broadcast domains?",
        options: ["Router", "Switch", "Hub", "Repeater"],
        correctIndex: 0,
        explanation: "Routers separate broadcast domains."
      },
      {
        topic: "Appliances",
        question: "Which appliance is used to optimize WAN traffic by compressing and caching data?",
        options: ["WAN optimizer", "Proxy server", "Firewall", "Repeater"],
        correctIndex: 0,
        explanation: "WAN optimizers improve WAN performance using compression and caching."
      }
    ];

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function buildQuiz() {
      const quizDiv = document.getElementById("quiz");
      quizDiv.innerHTML = "";

      const qCopy = questions.map(q => {
        const optWithIndex = q.options.map((opt, idx) => ({
          text: opt,
          originalIndex: idx
        }));

        shuffleArray(optWithIndex);

        const newOptions = optWithIndex.map(o => o.text);
        const newCorrectIndex = optWithIndex.findIndex(
          o => o.originalIndex === q.correctIndex
        );

        return {
          ...q,
          options: newOptions,
          correctIndex: newCorrectIndex
        };
      });

      shuffleArray(qCopy);

      qCopy.forEach((q, qIndex) => {
        const card = document.createElement("div");
        card.className = "question-card";
        card.dataset.correctIndex = q.correctIndex;

        const header = document.createElement("div");
        header.className = "question-header";

        const numberSpan = document.createElement("div");
        numberSpan.className = "question-number";
        numberSpan.textContent = `Question ${qIndex + 1}`;

        const topicSpan = document.createElement("div");
        topicSpan.className = "topic-tag";
        topicSpan.textContent = q.topic;

        header.appendChild(numberSpan);
        header.appendChild(topicSpan);

        const qText = document.createElement("div");
        qText.className = "question-text";
        qText.textContent = q.question;

        const optionsDiv = document.createElement("div");
        optionsDiv.className = "options";

        const letters = ["a", "b", "c", "d"];

        q.options.forEach((optText, optIndex) => {
          const optDiv = document.createElement("label");
          optDiv.className = "option";

          const input = document.createElement("input");
          input.type = "radio";
          input.name = "q" + qIndex;
          input.value = optIndex;

          const letterSpan = document.createElement("span");
          letterSpan.className = "letter-label";
          letterSpan.innerHTML = `<strong>${letters[optIndex]})</strong>`;

          optDiv.appendChild(input);
          optDiv.appendChild(letterSpan);
          optDiv.appendChild(document.createTextNode("  " + optText));

          optionsDiv.appendChild(optDiv);
        });

        const feedbackRow = document.createElement("div");
        feedbackRow.className = "feedback-row";

        const feedback = document.createElement("div");
        feedback.className = "feedback";
        feedback.id = `feedback-${qIndex}`;

        const buttonsWrapper = document.createElement("div");

        const checkBtn = document.createElement("button");
        checkBtn.textContent = "Check Answer";
        checkBtn.type = "button";
        checkBtn.addEventListener("click", () => checkQuestion(qIndex));

        const expToggle = document.createElement("button");
        expToggle.textContent = "Show Explanation";
        expToggle.type = "button";
        expToggle.className = "explanation-toggle";
        expToggle.addEventListener("click", () => toggleExplanation(qIndex, expToggle));

        buttonsWrapper.appendChild(checkBtn);
        buttonsWrapper.appendChild(expToggle);

        feedbackRow.appendChild(feedback);
        feedbackRow.appendChild(buttonsWrapper);

        const explanation = document.createElement("div");
        explanation.className = "explanation";
        explanation.id = `exp-${qIndex}`;
        explanation.textContent = q.explanation;

        card.appendChild(header);
        card.appendChild(qText);
        card.appendChild(optionsDiv);
        card.appendChild(feedbackRow);
        card.appendChild(explanation);

        quizDiv.appendChild(card);
      });
    }

    function checkQuestion(qIndex) {
      const card = document.getElementsByClassName("question-card")[qIndex];
      const correctIndex = parseInt(card.dataset.correctIndex, 10);
      const radios = card.querySelectorAll("input[type='radio']");
      const feedback = document.getElementById(`feedback-${qIndex}`);

      let selectedIndex = -1;
      radios.forEach((r, idx) => {
        if (r.checked) selectedIndex = idx;
      });

      const optionDivs = card.getElementsByClassName("option");
      Array.from(optionDivs).forEach(div => {
        div.classList.remove("correct-selected", "incorrect-selected");
      });

      if (selectedIndex === -1) {
        feedback.textContent = "Select an answer before checking.";
        feedback.className = "feedback incorrect";
        return;
      }

      if (selectedIndex === correctIndex) {
        feedback.textContent = "Correct!";
        feedback.className = "feedback correct";
        optionDivs[selectedIndex].classList.add("correct-selected");
      } else {
        feedback.textContent = "Incorrect. Review the explanation.";
        feedback.className = "feedback incorrect";
        optionDivs[selectedIndex].classList.add("incorrect-selected");
        optionDivs[correctIndex].classList.add("correct-selected");
      }
    }

    function gradeQuiz() {
      const cards = document.getElementsByClassName("question-card");
      let correctCount = 0;
      let answeredCount = 0;

      Array.from(cards).forEach((card, qIndex) => {
        const correctIndex = parseInt(card.dataset.correctIndex, 10);
        const radios = card.querySelectorAll("input[type='radio']");
        let selectedIndex = -1;

        radios.forEach((r, idx) => {
          if (r.checked) selectedIndex = idx;
        });

        if (selectedIndex !== -1) {
          answeredCount++;
          if (selectedIndex === correctIndex) {
            correctCount++;
          }
        }

        checkQuestion(qIndex);
      });

      const total = cards.length;
      const scoreBox = document.getElementById("scoreBox");
      const scoreText = document.getElementById("scoreText");

      scoreText.textContent = `${correctCount} / ${total} correct (answered ${answeredCount} of ${total})`;
      scoreBox.style.display = "block";
    }

    function toggleExplanation(qIndex, btn) {
      const exp = document.getElementById(`exp-${qIndex}`);
      if (!exp) return;

      const isHidden = exp.style.display === "none" || exp.style.display === "";
      exp.style.display = isHidden ? "block" : "none";
      btn.textContent = isHidden ? "Hide Explanation" : "Show Explanation";
    }

    function showAllExplanations() {
      const exps = document.getElementsByClassName("explanation");
      Array.from(exps).forEach(exp => {
        exp.style.display = "block";
      });

      const toggles = document.getElementsByClassName("explanation-toggle");
      Array.from(toggles).forEach(btn => {
        btn.textContent = "Hide Explanation";
      });
    }

    function hideAllExplanations() {
      const exps = document.getElementsByClassName("explanation");
      Array.from(exps).forEach(exp => {
        exp.style.display = "none";
      });

      const toggles = document.getElementsByClassName("explanation-toggle");
      Array.from(toggles).forEach(btn => {
        btn.textContent = "Show Explanation";
      });
    }

    document.getElementById("shuffleBtn").addEventListener("click", () => {
      buildQuiz();
      document.getElementById("scoreBox").style.display = "none";
    });

    document.getElementById("gradeBtn").addEventListener("click", gradeQuiz);
    document.getElementById("showAllExpBtn").addEventListener("click", showAllExplanations);
    document.getElementById("hideAllExpBtn").addEventListener("click", hideAllExplanations);

    buildQuiz();

  });
  </script>
</body>
</html>
