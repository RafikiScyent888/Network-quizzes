<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Computing Concepts
          CompTIA Network+ - Saved Format</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: #0d1b2f;
      --panel-2: #10223c;
      --text: #e8eefc;
      --muted: #9fb0d1;
      --accent: #7fb3ff;
      --accent-2: #9ad0ff;
      --good: #7ee081;
      --bad: #ff8f8f;
      --border: #223a63;
      --shadow: 0 10px 30px rgba(0,0,0,.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #06101d 0%, #0b1830 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    .wrap { max-width: 980px; margin: 0 auto; }
    .card {
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 24px;
    }
    h1 { margin: 0 0 6px; font-size: 2rem; }
    .sub { color: var(--muted); margin-bottom: 18px; }
    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }
    .pill {
      background: rgba(127, 179, 255, 0.08);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.95rem;
    }
    .progress-wrap {
      width: 100%;
      height: 12px;
      background: #07101e;
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
      margin: 16px 0 24px;
    }
    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width .25s ease;
    }
    .question-number {
      color: var(--accent-2);
      font-size: 0.95rem;
      margin-bottom: 8px;
      letter-spacing: .03em;
    }
    .question-text {
      font-size: 1.18rem;
      line-height: 1.55;
      margin-bottom: 20px;
      font-weight: 700;
    }
    .options { display: grid; gap: 12px; }
    .option {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      cursor: pointer;
      transition: transform .08s ease, border-color .15s ease, background .15s ease;
    }
    .option:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
      background: rgba(127,179,255,.07);
    }
    .option input { margin-top: 3px; transform: scale(1.15); }
    .option code {
      font-family: "Courier New", Courier, monospace;
      white-space: pre;
      color: var(--text);
      font-size: 0.98rem;
      line-height: 1.5;
    }
    .feedback {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 12px;
      display: none;
      font-weight: 700;
    }
    .feedback.good {
      display: block;
      background: rgba(126, 224, 129, 0.10);
      border: 1px solid rgba(126, 224, 129, 0.35);
      color: var(--good);
    }
    .feedback.bad {
      display: block;
      background: rgba(255, 143, 143, 0.10);
      border: 1px solid rgba(255, 143, 143, 0.35);
      color: var(--bad);
    }
    details {
      margin-top: 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      overflow: hidden;
      display: none;
    }
    details.show { display: block; }
    summary {
      cursor: pointer;
      padding: 12px 14px;
      color: var(--accent-2);
      font-weight: 700;
      user-select: none;
    }
    .explanation {
      padding: 0 14px 14px;
      color: var(--text);
      line-height: 1.55;
    }
    .controls { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
    button {
      appearance: none;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, #17335d 0%, #122949 100%);
      color: var(--text);
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    button[disabled] { opacity: .5; cursor: not-allowed; }
    .secondary { background: linear-gradient(180deg, #101c31 0%, #0b1424 100%); }
    .result {
      display: none;
      margin-top: 18px;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(127,179,255,.07);
    }
    .result.show { display: block; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Cloud Computing Concepts
          CompTIA Network+</h1>
      <div class="sub">30-question practice set • Questions and answers shuffle on every load.</div>

      <div class="topbar">
        <div class="pill" id="scorePill">Score: 0 / 0</div>
        <div class="pill" id="progressPill">Question 1 / 1</div>
      </div>
      <div class="progress-wrap"><div class="progress" id="progressBar"></div></div>

      <div id="quizArea"></div>

      <div class="controls">
        <button id="nextBtn" disabled>Next</button>
        <button id="restartBtn" class="secondary">Restart</button>
      </div>

      <div class="result" id="resultBox"></div>
    </div>
  </div>

<script>
const QUESTIONS = [
{
        "type": "singleSelect",
        "Question": "A network administrator is deploying a new cloud-based file storage system that users can access from any device without installing additional software. Which cloud service model does this represent?",
        "Options": ["Infrastructure as a Service (IaaS)", "Platform as a Service (PaaS)", "Software as a Service (SaaS)", "Security as a Service (SECaaS)"],
        "Answer": [2],
        "Explanation": "Software as a Service (SaaS) provides fully managed applications accessible through a browser or app without requiring local installation."
      },
      {
        "type": "singleSelect",
        "Question": "A company wants full control over the operating system and installed applications but does not want to maintain physical servers. Which cloud model best fits this requirement?",
        "Options": ["Software as a Service (SaaS)", "Infrastructure as a Service (IaaS)", "Platform as a Service (PaaS)", "Function as a Service (FaaS)"],
        "Answer": [1],
        "Explanation": "Infrastructure as a Service (IaaS) provides virtual machines and storage while the customer manages the operating system (OS) and applications."
      },
      {
        "type": "singleSelect",
        "Question": "Which cloud characteristic allows multiple customers to share the same physical hardware while keeping their environments logically isolated?",
        "Options": ["Elasticity", "Multitenancy", "Measured service", "Orchestration"],
        "Answer": [1],
        "Explanation": "Multitenancy enables shared infrastructure while maintaining tenant isolation."
      },
      {
        "type": "singleSelect",
        "Question": "A company uses its private data center for sensitive workloads but bursts into a public cloud during peak usage. What deployment model is this?",
        "Options": ["Public cloud", "Hybrid cloud", "Community cloud", "Distributed cloud"],
        "Answer": [1],
        "Explanation": "Hybrid cloud blends private and public cloud resources."
      },
      {
        "type": "singleSelect",
        "Question": "Which cloud concept describes the ability to automatically scale resources up or down based on workload?",
        "Options": ["Elasticity", "Portability", "Abstraction", "Metering"],
        "Answer": [0],
        "Explanation": "Elasticity allows cloud resources to expand or contract dynamically."
      },
      {
        "type": "singleSelect",
        "Question": "A developer wants a cloud environment that includes runtime, database engines, and development tools without managing the underlying operating system (OS). Which model applies?",
        "Options": ["Infrastructure as a Service (IaaS)", "Platform as a Service (PaaS)", "Software as a Service (SaaS)", "Security as a Service (SECaaS)"],
        "Answer": [1],
        "Explanation": "Platform as a Service (PaaS) provides managed development environments and tools."
      },
      {
        "type": "singleSelect",
        "Question": "Which cloud characteristic ensures customers pay only for the resources they consume?",
        "Options": ["Measured service", "Elasticity", "Resource pooling", "Abstraction"],
        "Answer": [0],
        "Explanation": "Measured service tracks usage so customers are billed based on consumption."
      },
      {
        "type": "singleSelect",
        "Question": "A company wants to migrate a legacy application to the cloud without rewriting it. Which approach is most appropriate?",
        "Options": ["Platform as a Service (PaaS) refactor", "Infrastructure as a Service (IaaS) lift-and-shift", "Software as a Service (SaaS) subscription", "Function as a Service (FaaS) event-driven"],
        "Answer": [1],
        "Explanation": "Infrastructure as a Service (IaaS) supports lift-and-shift migrations with minimal modification."
      },
      {
        "type": "singleSelect",
        "Question": "Which cloud concept hides the complexity of underlying hardware from the user?",
        "Options": ["Elasticity", "Abstraction", "Replication", "Metering"],
        "Answer": [1],
        "Explanation": "Abstraction masks hardware details and presents virtualized resources."
      },
      {
        "type": "singleSelect",
        "Question": "A cloud provider offers identity management, malware scanning, and intrusion detection as a subscription. What service model is this?",
        "Options": ["Software as a Service (SaaS)", "Security as a Service (SECaaS)", "Infrastructure as a Service (IaaS)", "Platform as a Service (PaaS)"],
        "Answer": [1],
        "Explanation": "Security as a Service (SECaaS) delivers cloud-based security services."
      },
      {
        "type": "singleSelect",
        "Question": "Which deployment model is owned and operated exclusively for a single organization?",
        "Options": ["Public cloud", "Private cloud", "Community cloud", "Hybrid cloud"],
        "Answer": [1],
        "Explanation": "Private clouds are dedicated to one organization."
      },
      {
        "type": "singleSelect",
        "Question": "Which cloud characteristic allows users to provision resources without human interaction?",
        "Options": ["On-demand self-service", "Multitenancy", "Measured service", "Elasticity"],
        "Answer": [0],
        "Explanation": "On-demand self-service allows users to deploy resources instantly."
      },
      {
        "type": "singleSelect",
        "Question": "A company uses multiple public cloud providers to avoid vendor lock-in. What strategy is this?",
        "Options": ["Hybrid cloud", "Multicloud", "Distributed cloud", "Community cloud"],
        "Answer": [1],
        "Explanation": "Multicloud uses multiple public cloud vendors simultaneously."
      },
      {
        "type": "singleSelect",
        "Question": "Which cloud concept ensures workloads can move between environments with minimal reconfiguration?",
        "Options": ["Portability", "Elasticity", "Abstraction", "Metering"],
        "Answer": [0],
        "Explanation": "Portability allows workloads to run across different environments with few changes."
      },
      {
        "type": "singleSelect",
        "Question": "A cloud provider automatically deploys additional compute nodes when central processing unit (CPU) usage exceeds 80%. What is this an example of?",
        "Options": ["Elastic scaling", "Resource pooling", "Abstraction", "Orchestration"],
        "Answer": [0],
        "Explanation": "Elastic scaling adjusts resources based on demand."
      },
      {
        "type": "singleSelect",
        "Question": "Which cloud deployment model is shared by organizations with similar compliance or security needs?",
        "Options": ["Community cloud", "Public cloud", "Hybrid cloud", "Private cloud"],
        "Answer": [0],
        "Explanation": "Community clouds serve groups with shared requirements."
      },
      {
        "type": "singleSelect",
        "Question": "A company wants to run serverless functions that execute only when triggered by events. Which cloud model supports this?",
        "Options": ["Function as a Service (FaaS)", "Platform as a Service (PaaS)", "Infrastructure as a Service (IaaS)", "Software as a Service (SaaS)"],
        "Answer": [0],
        "Explanation": "Function as a Service (FaaS) executes code in response to events without managing servers."
      },
      {
        "type": "singleSelect",
        "Question": "Which cloud concept refers to pooling computing resources to serve multiple customers efficiently?",
        "Options": ["Resource pooling", "Elasticity", "Metering", "Abstraction"],
        "Answer": [0],
        "Explanation": "Resource pooling allows providers to dynamically allocate resources to customers."
      },
      {
        "type": "singleSelect",
        "Question": "A company wants to deploy a cloud environment across multiple geographic regions to reduce latency. Which concept applies?",
        "Options": ["Distributed cloud", "Hybrid cloud", "Multicloud", "Community cloud"],
        "Answer": [0],
        "Explanation": "Distributed cloud places cloud resources in multiple physical locations."
      },
      {
        "type": "singleSelect",
        "Question": "Which cloud model provides the highest level of customer control?",
        "Options": ["Software as a Service (SaaS)", "Platform as a Service (PaaS)", "Infrastructure as a Service (IaaS)", "Security as a Service (SECaaS)"],
        "Answer": [2],
        "Explanation": "Infrastructure as a Service (IaaS) gives customers control over operating system (OS), applications, and configurations."
      },
      {
        "type": "singleSelect",
        "Question": "A company wants to automate provisioning, configuration, and deployment of cloud resources. Which concept is this?",
        "Options": ["Orchestration", "Elasticity", "Multitenancy", "Metering"],
        "Answer": [0],
        "Explanation": "Orchestration automates complex cloud workflows."
      },
      {
        "type": "singleSelect",
        "Question": "Which cloud concept ensures that data and applications remain available even if a server fails?",
        "Options": ["Replication", "Elasticity", "Abstraction", "Metering"],
        "Answer": [0],
        "Explanation": "Replication maintains copies of data across systems for availability."
      },
      {
        "type": "singleSelect",
        "Question": "A company wants to use cloud services but must comply with strict data sovereignty laws. Which deployment model is most appropriate?",
        "Options": ["Public cloud", "Private cloud", "Community cloud", "Hybrid cloud"],
        "Answer": [1],
        "Explanation": "Private cloud offers full control over data location and compliance."
      },
      {
        "type": "singleSelect",
        "Question": "Which cloud service model provides the least customer responsibility?",
        "Options": ["Infrastructure as a Service (IaaS)", "Platform as a Service (PaaS)", "Software as a Service (SaaS)", "Function as a Service (FaaS)"],
        "Answer": [2],
        "Explanation": "Software as a Service (SaaS) handles everything except user data."
      },
      {
        "type": "singleSelect",
        "Question": "A company wants to deploy containers in the cloud without managing the underlying container hosts. Which model supports this?",
        "Options": ["Container-as-a-Service", "Infrastructure as a Service (IaaS)", "Software as a Service (SaaS)", "Security as a Service (SECaaS)"],
        "Answer": [0],
        "Explanation": "Container as a Service (CaaS) provides managed container orchestration environments."
      },
      {
        "type": "singleSelect",
        "Question": "Which cloud concept allows customers to quickly deploy additional instances of an application to handle increased demand?",
        "Options": ["Horizontal scaling", "Vertical scaling", "Abstraction", "Metering"],
        "Answer": [0],
        "Explanation": "Horizontal scaling adds more instances to distribute load."
      },
      {
        "type": "singleSelect",
        "Question": "Which cloud model allows customers to run applications without provisioning or managing servers?",
        "Options": ["Function as a Service (FaaS)", "Infrastructure as a Service (IaaS)", "Platform as a Service (PaaS)", "Software as a Service (SaaS)"],
        "Answer": [0],
        "Explanation": "Function as a Service (FaaS) executes code without server management."
      },
      {
        "type": "singleSelect",
        "Question": "A company wants to centralize logging, monitoring, and alerting across multiple cloud environments. Which concept supports this?",
        "Options": ["Cloud management platform", "Elasticity", "Multitenancy", "Replication"],
        "Answer": [0],
        "Explanation": "Cloud management platforms unify monitoring and control across environments."
      },
      {
        "type": "singleSelect",
        "Question": "Which cloud characteristic ensures that resources can be provisioned and released rapidly?",
        "Options": ["Rapid elasticity", "Measured service", "Resource pooling", "Abstraction"],
        "Answer": [0],
        "Explanation": "Rapid elasticity enables quick scaling of resources."
      },
      {
        "type": "singleSelect",
        "Question": "A company wants to run workloads in the cloud but maintain sensitive data on-premises. Which model supports this?",
        "Options": ["Hybrid cloud", "Public cloud", "Community cloud", "Distributed cloud"],
        "Answer": [0],
        "Explanation": "Hybrid cloud allows workloads to span cloud and on-premises environments."
      }
];

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function ensurePeriod(s) {
  s = String(s).trim();
  return /[.!?]$/.test(s) ? s : s + ".";
}

function padOptions(options) {
  const normalized = options.map(ensurePeriod);
  const maxLen = Math.max(...normalized.map(s => s.length));
  return normalized.map(s => s + "\u00A0".repeat(maxLen - s.length));
}

let state = {
  questions: [],
  index: 0,
  score: 0,
  answered: false
};

function prepareQuestions() {
  const qList = QUESTIONS.map(q => {
    const answers = q.Options.map((ans, idx) => ({
      ans: ensurePeriod(ans),
      isCorrect: q.Answer.includes(idx)
    }));
    shuffle(answers);
    return {
      q: q.Question,
      e: q.Explanation,
      answers
    };
  });
  shuffle(qList);
  return qList;
}

function renderQuestion() {
  const quizArea = document.getElementById("quizArea");
  const progressBar = document.getElementById("progressBar");
  const scorePill = document.getElementById("scorePill");
  const progressPill = document.getElementById("progressPill");
  const nextBtn = document.getElementById("nextBtn");
  const resultBox = document.getElementById("resultBox");

  nextBtn.disabled = true;
  resultBox.classList.remove("show");

  if (state.index >= state.questions.length) {
    quizArea.innerHTML = "";
    progressBar.style.width = "100%";
    scorePill.textContent = `Score: ${state.score} / ${state.questions.length}`;
    progressPill.textContent = `Completed: ${state.questions.length} / ${state.questions.length}`;
    resultBox.innerHTML = `<strong>Finished.</strong><br>Your score: <strong>${state.score} / ${state.questions.length}</strong>.`;
    resultBox.classList.add("show");
    return;
  }

  const item = state.questions[state.index];
  const displayAnswers = padOptions(item.answers.map(x => x.ans));

  progressBar.style.width = `${(state.index / state.questions.length) * 100}%`;
  scorePill.textContent = `Score: ${state.score} / ${state.index}`;
  progressPill.textContent = `Question ${state.index + 1} / ${state.questions.length}`;

  quizArea.innerHTML = `
    <div class="question-number">Question ${state.index + 1}</div>
    <div class="question-text">${item.q}</div>
    <div class="options">
      ${item.answers.map((obj, i) => `
        <label class="option">
          <input type="radio" name="answer" value="${i}">
          <code>${String.fromCharCode(65 + i)}) ${displayAnswers[i]}</code>
        </label>
      `).join("")}
    </div>
    <div id="feedback" class="feedback"></div>
    <details id="explainBox">
      <summary>Explanation</summary>
      <div class="explanation">${item.e}</div>
    </details>
  `;

  state.answered = false;

  document.querySelectorAll('input[name="answer"]').forEach((input) => {
    input.addEventListener("change", () => {
      if (state.answered) return;
      state.answered = true;
      const chosen = Number(input.value);
      const correct = item.answers[chosen].isCorrect;
      const feedback = document.getElementById("feedback");
      const explainBox = document.getElementById("explainBox");

      if (correct) {
        state.score += 1;
        feedback.textContent = "Correct.";
        feedback.className = "feedback good";
      } else {
        feedback.textContent = "Incorrect.";
        feedback.className = "feedback bad";
      }

      explainBox.classList.add("show");
      nextBtn.disabled = false;

      document.querySelectorAll('input[name="answer"]').forEach((el) => el.disabled = true);
      document.getElementById("scorePill").textContent = `Score: ${state.score} / ${state.index + 1}`;
    });
  });
}

function restartQuiz() {
  state.questions = prepareQuestions();
  state.index = 0;
  state.score = 0;
  state.answered = false;
  renderQuestion();
}

document.getElementById("nextBtn").addEventListener("click", () => {
  if (!state.answered) return;
  state.index += 1;
  renderQuestion();
});

document.getElementById("restartBtn").addEventListener("click", restartQuiz);

restartQuiz();
</script>
</body>
</html>
