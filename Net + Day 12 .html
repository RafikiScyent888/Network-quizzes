<html lang="en">
<head>
<meta charset="UTF-8" />

<title>Network+ Wireless & Physical Installations Quiz</title>
<style>

    font-size:1.6rem;
    line-height:1.25;
    letter-spacing:0.2px;
  }
  .sub {
    color:var(--muted);
    font-size:0.98rem;
    line-height:1.45;
  }
  .statusbar {
    display:grid;
    grid-template-columns:1fr auto auto;

    align-items:center;
    margin-top:16px;
  }
  .progress-shell {
    height:12px;
    background:#0a1730;
    border:1px solid rgba(138,176,255,0.18);

    overflow:hidden;
  }

    width:0%;

  }
  .pill {
    border:1px solid rgba(138,176,255,0.22);
    background:rgba(255,255,255,0.03);
    border-radius:999px;

    font-size:0.92rem;
    color:var(--text);
    white-space:nowrap;
  }
  .main {
    padding:24px;
  }
  .question-num {
    color:#8fb2f1;
    font-size:0.92rem;

    letter-spacing:0.12em;
    margin-bottom:10px;
  }

    line-height:1.55;
    margin:0 0 18px;
  }
  .answers {
    display:grid;
    gap:12px;
  }

    text-align:left;
    border:1px solid var(--line);
    border-radius:16px;
    background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));

    white-space:nowrap;
    overflow:hidden;
    text-overflow:clip;
  }
  .answer-btn:hover:not(:disabled) {
    transform:translateY(-1px);
    border-color:#86adff;
    background:rgba(255,255,255,0.055);
  }
  .answer-btn:disabled {
    cursor:default;
  }
  .answer-btn.correct {
    background:var(--good);
    border-color:var(--good-line);
    color:#effff4;
  }
  .answer-btn.incorrect {
    background:var(--bad);
    border-color:var(--bad-line);
    color:#fff1f3;
  }
  .answer-btn.reveal-correct {
    background:#102d20;
    border-color:#55d88c;
    color:#effff4;
  }

    padding:14px 16px;
    border-radius:16px;
    display:none;
    border:1px solid transparent;
    line-height:1.5;
  }

    background:var(--good);
    border-color:var(--good-line);
  }
  .feedback.bad {
    display:block;
    background:var(--bad);
    border-color:var(--bad-line);
  }

    margin-top:14px;
    border:1px solid rgba(138,176,255,0.18);
    border-radius:16px;
    background:var(--info);
    overflow:hidden;
  }

    cursor:pointer;
    list-style:none;
    padding:14px 16px;
    font-weight:700;
  }
  summary::-webkit-details-marker { display:none; }
  .explanation {
    padding:0 16px 16px;
    color:#e4efff;
    line-height:1.55;
  }
  .controls {
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:20px;
  }
  .btn {

    font-weight:700;
    color:white;
    background:var(--btn);

  .score-big {

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function letter(index) {
  return ["A", "B", "C", "D"][index] || "?";
}

function nbspPad(text, target) {
  const bare = text.replace(/ /g, "\u00A0");
  const diff = Math.max(0, target - text.length);
  return bare + "\u00A0".repeat(diff);
}

function buildQuiz() {
  return shuffle(sourceQuestions).map((q) => {
    const options = q.choices.map((text, idx) => ({
      text,
      correct: idx === q.correct
    }));
    const shuffled = shuffle(options);
    const maxLen = Math.max(...shuffled.map(o => o.text.length));
    return {
      q: q.q,
      explanation: q.exp,
      options: shuffled.map((opt, idx) => ({
        label: `${letter(idx)}) ${nbspPad(opt.text, maxLen)}`,
        text: opt.text,
        correct: opt.correct
      }))
    };
  });
}

let quiz = buildQuiz();
let current = 0;
let score = 0;
let locked = false;
let history = [];

const quizPanel = document.getElementById("quizPanel");
const resultPanel = document.getElementById("resultPanel");
const questionNum = document.getElementById("questionNum");
const questionText = document.getElementById("questionText");
const answersDiv = document.getElementById("answers");
const feedback = document.getElementById("feedback");
const explainBox = document.getElementById("explainBox");
const explanationText = document.getElementById("explanationText");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const retryBtn = document.getElementById("retryBtn");
const progressFill = document.getElementById("progressFill");
const progressText = document.getElementById("progressText");
const scoreText = document.getElementById("scoreText");
const finalScore = document.getElementById("finalScore");
const finalMsg = document.getElementById("finalMsg");
const reviewList = document.getElementById("reviewList");

function updateHeader() {
  const answered = history.length;
  const pct = ((current) / quiz.length) * 100;
  progressFill.style.width = `${pct}%`;
  progressText.textContent = `Question ${Math.min(current + 1, quiz.length)} of ${quiz.length}`;
  scoreText.textContent = `Score ${score}/${answered}`;
}

function renderQuestion() {
  locked = false;
  nextBtn.disabled = true;
  feedback.className = "feedback";
  feedback.textContent = "";
  explainBox.open = false;
  explanationText.textContent = "";
  answersDiv.innerHTML = "";

  const item = quiz[current];
  questionNum.textContent = `Question ${current + 1}`;
  questionText.textContent = item.q;
  explanationText.textContent = item.explanation;

  item.options.forEach((opt) => {
    const btn = document.createElement("button");
    btn.className = "answer-btn";
    btn.innerHTML = opt.label;
    btn.addEventListener("click", () => selectAnswer(btn, opt, item.options));
    answersDiv.appendChild(btn);
  });

  updateHeader();
}

function selectAnswer(clickedBtn, opt, options) {
  if (locked) return;
  locked = true;
  const buttons = [...answersDiv.querySelectorAll(".answer-btn")];
  buttons.forEach(b => b.disabled = true);

  const correctOption = options.find(o => o.correct);
  const correctIndex = options.findIndex(o => o.correct);

  if (opt.correct) {
    score += 1;
    clickedBtn.classList.add("correct");
    feedback.className = "feedback good";
    feedback.textContent = `Correct. ${letter(correctIndex)} is the best fit for this scenario.`;
  } else {
    clickedBtn.classList.add("incorrect");
    const correctBtn = buttons[correctIndex];
    if (correctBtn) correctBtn.classList.add("reveal-correct");
    feedback.className = "feedback bad";
    feedback.textContent = `Not this one. The best answer is ${letter(correctIndex)} because it matches the wireless or installation requirement more precisely.`;
  }

  history.push({
    question: quiz[current].q,
    chosen: opt.text,
    correct: correctOption.text,
    wasCorrect: opt.correct,
    explanation: quiz[current].explanation
  });

  explainBox.open = true;
  nextBtn.disabled = false;
  scoreText.textContent = `Score ${score}/${history.length}`;
}

function showResults() {
  progressFill.style.width = "100%";
  progressText.textContent = `Completed ${quiz.length} of ${quiz.length}`;
  scoreText.textContent = `Score ${score}/${quiz.length}`;
  quizPanel.style.display = "none";
  resultPanel.classList.add("show");

  const pct = Math.round((score / quiz.length) * 100);
  finalScore.textContent = `Final Score: ${score}/${quiz.length} (${pct}%)`;

  let msg = "Keep drilling the explanations and near-miss differences.";
  if (pct >= 90) msg = "Strong work. Your answer selection is looking exam-ready.";
  else if (pct >= 75) msg = "Nice job. A few near-miss concepts still need tightening.";
  else if (pct >= 60) msg = "Good foundation. Focus on standards, antennas, and install tools.";
  finalMsg.textContent = msg;

  reviewList.innerHTML = history.map((item, idx) => `
    <div class="review-item">
      <div class="tag ${item.wasCorrect ? "good" : "bad"}">${item.wasCorrect ? "Correct" : "Review Needed"}</div>
      <h3>${idx + 1}. ${item.question}</h3>
      <div class="mini">Your answer: ${item.chosen}</div>
      <div class="mini">Best answer: ${item.correct}</div>
      <div class="sub">${item.explanation}</div>
    </div>
  `).join("");
}

nextBtn.addEventListener("click", () => {
  current += 1;
  if (current >= quiz.length) {
    showResults();
  } else {
    renderQuestion();
  }
});

function restartQuiz() {
  quiz = buildQuiz();
  current = 0;
  score = 0;
  locked = false;
  history = [];
  resultPanel.classList.remove("show");
  quizPanel.style.display = "block";
  renderQuestion();
}

restartBtn.addEventListener("click", restartQuiz);
retryBtn.addEventListener("click", restartQuiz);

renderQuestion();
</script>
</body>
</html>
