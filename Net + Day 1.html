<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CompTIA Network+ Quiz – Topologies & OSI (30 Questions)</title>

  <style>
    body {
      font-family: Segoe UI, Tahoma, Arial, sans-serif;
      background-color: #f3f4f6;
      margin: 0;
      padding: 0;
      color: #111827;
    }

    .container {
      max-width: 1000px;
      margin: 30px auto;
      background: #ffffff;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 20px 25px 30px;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      font-size: 26px;
      color: #111827;
    }

    h2 {
      font-size: 18px;
      color: #374151;
      text-align: center;
      margin-top: 5px;
      margin-bottom: 20px;
    }

    .meta {
      text-align: center;
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 15px;
    }

    button {
      border: none;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
      background-color: #2563eb;
      color: white;
      transition: background-color 0.15s ease, transform 0.05s ease;
    }

    button:hover {
      background-color: #1d4ed8;
    }

    button:active {
      transform: scale(0.97);
    }

    button.secondary {
      background-color: #6b7280;
    }

    button.secondary:hover {
      background-color: #4b5563;
    }

    .question-card {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 14px 14px 10px;
      margin-bottom: 14px;
      background-color: #f9fafb;
    }

    .question-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
    }

    .question-number {
      font-weight: 600;
      color: #374151;
    }

    .topic-tag {
      font-size: 11px;
      padding: 1px 7px;
      border-radius: 999px;
      background-color: #e5e7eb;
      color: #4b5563;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .question-text {
      margin-bottom: 8px;
      font-size: 14px;
    }

    .options {
      margin-bottom: 6px;
    }

    .option {
      margin-bottom: 4px;
      padding: 4px 6px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background-color 0.1s ease;
    }

    .option.correct-selected {
      background-color: #dcfce7;
    }

    .option.incorrect-selected {
      background-color: #fee2e2;
    }

    .option input {
      margin-right: 6px;
    }

    .letter-label {
      font-weight: bold;
      width: 40px;
      display: inline-block;
    }

    .feedback-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 4px;
    }

    .feedback {
      font-size: 13px;
      min-height: 18px;
    }

    .feedback.correct {
      color: #15803d;
    }

    .feedback.incorrect {
      color: #b91c1c;
    }

    .explanation {
      margin-top: 6px;
      font-size: 13px;
      color: #374151;
      background-color: #eff6ff;
      border-radius: 6px;
      padding: 6px 8px;
      display: none;
    }

    .explanation-toggle {
      font-size: 12px;
      background: #e5e7eb;
      color: #374151;
      padding: 3px 8px;
    }

    .score-box {
      text-align: center;
      font-size: 14px;
      margin-top: 10px;
      padding: 8px;
      border-radius: 8px;
      background-color: #eff6ff;
      color: #1d4ed8;
    }

    .score-box span {
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>CompTIA Network+ Practice Quiz</h1>
    <h2>Network Topologies & OSI Reference Model (30 Questions)</h2>

    <div class="meta">
      Questions and answers are randomized on each load.  
      Get instant feedback and explanations as you go.
    </div>

    <div class="controls">
      <button id="shuffleBtn">Shuffle Questions & Answers</button>
      <button id="gradeBtn" class="secondary">Grade Quiz</button>
      <button id="showAllExpBtn" class="secondary">Show All Explanations</button>
      <button id="hideAllExpBtn" class="secondary">Hide All Explanations</button>
    </div>

    <div id="quiz"></div>

    <div id="scoreBox" class="score-box" style="display:none;">
      Final Score: <span id="scoreText"></span>
    </div>
  </div>

  <script>
  document.addEventListener("DOMContentLoaded", function() {
    const questions = [
      {
        topic: "Topology",
        question: "Which network topology connects all devices to a single central device such as a switch or hub?",
        options: ["Star topology","Bus topology","Ring topology","Mesh topology"],
        correctIndex: 0,
        explanation: "A star topology uses a central device (switch/hub) that all nodes connect to individually."
      },
      {
        topic: "Topology",
        question: "In which topology do all devices share a single backbone cable, and a break in that cable can take down the entire network segment?",
        options: ["Bus topology","Star topology","Mesh topology","Hybrid topology"],
        correctIndex: 0,
        explanation: "A bus topology uses one main cable, or backbone. A break disrupts the entire segment."
      },
      {
        topic: "Topology",
        question: "Which topology offers the highest redundancy by providing multiple paths between nodes?",
        options: ["Full mesh topology","Bus topology","Star topology","Ring topology"],
        correctIndex: 0,
        explanation: "A full mesh topology provides direct links between all nodes, maximizing redundancy."
      },
      {
        topic: "Topology",
        question: "A network uses a physical star layout, but logically all devices share the same collision domain because a hub is used. What is this?",
        options: ["Physical star, logical bus","Physical bus, logical star","Physical mesh, logical ring","Physical ring, logical mesh"],
        correctIndex: 0,
        explanation: "A hub creates a shared medium like a bus, even though the wiring is a star."
      },
      {
        topic: "Topology",
        question: "Which WAN topology connects each site to a central site, similar to a hub-and-spoke model?",
        options: ["Star topology","Full mesh topology","Bus topology","Ring topology"],
        correctIndex: 0,
        explanation: "Hub-and-spoke WANs are essentially star topologies."
      },
      {
        topic: "Topology",
        question: "In a ring topology, how does data typically travel between devices?",
        options: ["From node to node in a circular path","Directly from each device to every other device","All devices share a single coaxial cable","Using a dedicated link to a central switch"],
        correctIndex: 0,
        explanation: "Ring topology passes frames around the circle until they reach the destination."
      },
      {
        topic: "Topology",
        question: "Which topology is most commonly used in modern Ethernet LANs?",
        options: ["Star topology using switches","Bus topology using coaxial cable","Logical ring using token passing","Full mesh topology between all workstations"],
        correctIndex: 0,
        explanation: "Modern Ethernet LANs use a physical star with switches."
      },
      {
        topic: "Topology",
        question: "A company combines a star topology in its access layer with a partial mesh between distribution switches. What is this?",
        options: ["Hybrid topology","Bus topology","Logical ring topology","Point-to-point topology"],
        correctIndex: 0,
        explanation: "Combining multiple topology types creates a hybrid topology."
      },
      {
        topic: "Topology",
        question: "Which topology is most sensitive to a single device failure in classic implementations?",
        options: ["Ring topology","Full mesh topology","Star topology","Bus topology"],
        correctIndex: 0,
        explanation: "A break in a ring disrupts the entire loop unless redundancy is added."
      },
      {
        topic: "Topology",
        question: "Which topology describes a direct link between exactly two network devices?",
        options: ["Point-to-point topology","Star topology","Point-to-multipoint topology","Bus topology"],
        correctIndex: 0,
        explanation: "Point-to-point is a single dedicated connection between two endpoints."
      },
      {
        topic: "Topology",
        question: "Which topology is commonly used in wireless networks where one AP serves multiple clients?",
        options: ["Point-to-multipoint topology","Bus topology","Ring topology","Full mesh topology"],
        correctIndex: 0,
        explanation: "Wi-Fi uses a point-to-multipoint structure with an AP at the center."
      },
      {
        topic: "Topology",
        question: "In a partial mesh topology, what is the main trade-off compared to full mesh?",
        options: ["Less redundancy but lower cost and complexity","More redundancy but lower cost","Higher redundancy and higher cost","No redundancy but highest performance"],
        correctIndex: 0,
        explanation: "Partial mesh reduces cost while still offering some redundancy."
      },
      {
        topic: "OSI",
        question: "At which OSI layer does a switch primarily operate when making forwarding decisions?",
        options: ["Layer 2 – Data Link","Layer 1 – Physical","Layer 3 – Network","Layer 4 – Transport"],
        correctIndex: 0,
        explanation: "Switches forward frames using MAC addresses at Layer 2."
      },
      {
        topic: "OSI",
        question: "At which OSI layer would you associate IP addressing and routing?",
        options: ["Layer 3 – Network","Layer 2 – Data Link","Layer 4 – Transport","Layer 7 – Application"],
        correctIndex: 0,
        explanation: "Routing and IP addressing occur at Layer 3."
      },
      {
        topic: "OSI",
        question: "Which OSI layer is responsible for segmentation and end-to-end transport?",
        options: ["Layer 4 – Transport","Layer 2 – Data Link","Layer 3 – Network","Layer 5 – Session"],
        correctIndex: 0,
        explanation: "Layer 4 handles segmentation, flow control, and reliability."
      },
      {
        topic: "OSI",
        question: "Which OSI layer would you troubleshoot if you suspect a bad cable or NIC port?",
        options: ["Layer 1 – Physical","Layer 2 – Data Link","Layer 3 – Network","Layer 4 – Transport"],
        correctIndex: 0,
        explanation: "Physical connectivity issues occur at Layer 1."
      },
      {
        topic: "OSI",
        question: "Frame checksums and MAC address-based forwarding are associated with which OSI layer?",
        options: ["Layer 2 – Data Link","Layer 1 – Physical","Layer 3 – Network","Layer 7 – Application"],
        correctIndex: 0,
        explanation: "Layer 2 handles frames, MAC addresses, and link-level error detection."
      },
      {
        topic: "OSI",
        question: "Which OSI layer manages the setup, maintenance, and teardown of communication sessions?",
        options: ["Layer 5 – Session","Layer 3 – Network","Layer 4 – Transport","Layer 6 – Presentation"],
        correctIndex: 0,
        explanation: "The Session layer manages dialogs between applications."
      },
      {
        topic: "OSI",
        question: "Encryption and decryption are most commonly associated with which OSI layer?",
        options: ["Layer 6 – Presentation","Layer 2 – Data Link","Layer 3 – Network","Layer 7 – Application"],
        correctIndex: 0,
        explanation: "Layer 6 handles data formatting, compression, and encryption."
      },
      {
        topic: "OSI",
        question: "HTTP, FTP, and SMTP operate at which OSI layer?",
        options: ["Layer 7 – Application","Layer 4 – Transport","Layer 3 – Network","Layer 2 – Data Link"],
        correctIndex: 0,
        explanation: "Application protocols operate at Layer 7."
      },
      {
        topic: "OSI",
        question: "A router dropping packets due to an invalid IP address is a problem at which OSI layer?",
        options: ["Layer 3 – Network","Layer 2 – Data Link","Layer 4 – Transport","Layer 7 – Application"],
        correctIndex: 0,
        explanation: "Routers operate at Layer 3."
      },
      {
        topic: "OSI",
        question: "TCP and UDP operate at which OSI layer?",
        options: ["Layer 4 – Transport","Layer 3 – Network","Layer 2 – Data Link","Layer 1 – Physical"],
        correctIndex: 0,
        explanation: "TCP and UDP are Transport layer protocols."
      },
      {
        topic: "OSI",
        question: "Which OSI layer adds port numbers to direct traffic to the correct application?",
        options: ["Layer 4 – Transport","Layer 3 – Network","Layer 2 – Data Link","Layer 5 – Session"],
        correctIndex: 0,
        explanation: "Port numbers are part of Layer 4."
      },
      {
        topic: "OSI",
        question: "A user can ping a server but cannot load its webpage. Which OSI layer is likely at fault?",
        options: ["Layer 7 – Application","Layer 1 – Physical","Layer 2 – Data Link","Layer 3 – Network"],
        correctIndex: 0,
        explanation: "If ping works but HTTP fails, the issue is at the Application layer."
      },
      {
        topic: "Topology/OSI",
        question: "Users on different switches in a star topology report slow file transfers. Which OSI layer should you check first?",
        options: ["Layer 2 switches and VLAN configuration","Layer 1 cabling","Layer 7 application settings","Layer 5 session timers"],
        correctIndex: 0,
        explanation: "Inter-switch performance issues often relate to Layer 2."
      },
      {
        topic: "Topology/OSI",
        question: "In a bus topology, the shared coax cable primarily operates at which OSI layer?",
        options: ["Layer 1 – Physical","Layer 3 – Network","Layer 4 – Transport","Layer 7 – Application"],
        correctIndex: 0,
        explanation: "The shared medium itself is a Layer 1 component."
      },
      {
        topic: "Topology/OSI",
        question: "Redesigning a full mesh WAN into a partial mesh affects which OSI layer most directly?",
        options: ["Layer 3 – Network","Layer 1 – Physical","Layer 4 – Transport","Layer 6 – Presentation"],
        correctIndex: 0,
        explanation: "WAN topology changes affect routing paths at Layer 3."
      },
      {
        topic: "Topology/OSI",
        question: "Frames are not circulating correctly between two adjacent nodes in a ring topology. Which OSI layers should you check first?",
        options: ["Layer 1 (Physical) and Layer 2 (Data Link)","Layer 3 (Network) and Layer 4 (Transport)","Layer 5 (Session) and Layer 7 (Application)","Layer 2 (Data Link) and Layer 6 (Presentation)"],
        correctIndex: 0,
        explanation: "Ring issues usually involve physical links or frame forwarding."
      },
      {
        topic: "Topology/OSI",
        question: "Which OSI layer is responsible for how data is formatted and presented to the user?",
        options: ["Layer 6 – Presentation","Layer 2 – Data Link","Layer 3 – Network","Layer 4 – Transport"],
        correctIndex: 0,
        explanation: "Layer 6 handles data format, character sets, and presentation."
      },
      {
        topic: "Topology/OSI",
        question: "In a star topology, users can communicate locally but cannot reach external networks. Which device is most likely at fault?",
        options: ["Layer 3 router or default gateway","Layer 1 patch panel","Layer 2 switch port","Layer 7 application proxy"],
        correctIndex: 0,
        explanation: "If local traffic works but external traffic fails, the router/default gateway is the issue."
      }
    ];
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function buildQuiz() {
      const quizDiv = document.getElementById("quiz");
      quizDiv.innerHTML = "";

      // Randomize questions AND answers
      const qCopy = questions.map(q => {
        const optWithIndex = q.options.map((opt, idx) => ({
          text: opt,
          originalIndex: idx
        }));

        shuffleArray(optWithIndex);

        const newOptions = optWithIndex.map(o => o.text);
        const newCorrectIndex = optWithIndex.findIndex(
          o => o.originalIndex === q.correctIndex
        );

        return {
          ...q,
          options: newOptions,
          correctIndex: newCorrectIndex
        };
      });

      shuffleArray(qCopy);

      // Build each question card
      qCopy.forEach((q, qIndex) => {
        const card = document.createElement("div");
        card.className = "question-card";
        card.dataset.correctIndex = q.correctIndex;

        // Header row
        const header = document.createElement("div");
        header.className = "question-header";

        const numberSpan = document.createElement("div");
        numberSpan.className = "question-number";
        numberSpan.textContent = `Question ${qIndex + 1}`;

        const topicSpan = document.createElement("div");
        topicSpan.className = "topic-tag";
        topicSpan.textContent = q.topic;

        header.appendChild(numberSpan);
        header.appendChild(topicSpan);

        // Question text
        const qText = document.createElement("div");
        qText.className = "question-text";
        qText.textContent = q.question;

        // Options
        const optionsDiv = document.createElement("div");
        optionsDiv.className = "options";

        const letters = ["a", "b", "c", "d"];

        q.options.forEach((optText, optIndex) => {
          const optDiv = document.createElement("label");
          optDiv.className = "option";

          const input = document.createElement("input");
          input.type = "radio";
          input.name = "q" + qIndex;
          input.value = optIndex;

          const letterSpan = document.createElement("span");
          letterSpan.className = "letter-label";
          letterSpan.innerHTML = `<strong>${letters[optIndex]})</strong>`;

          optDiv.appendChild(input);
          optDiv.appendChild(letterSpan);
          optDiv.appendChild(document.createTextNode("  " + optText));

          optionsDiv.appendChild(optDiv);
        });

        // Feedback + buttons row
        const feedbackRow = document.createElement("div");
        feedbackRow.className = "feedback-row";

        const feedback = document.createElement("div");
        feedback.className = "feedback";
        feedback.id = `feedback-${qIndex}`;

        const buttonsWrapper = document.createElement("div");

        const checkBtn = document.createElement("button");
        checkBtn.textContent = "Check Answer";
        checkBtn.type = "button";
        checkBtn.addEventListener("click", () => checkQuestion(qIndex));

        const expToggle = document.createElement("button");
        expToggle.textContent = "Show Explanation";
        expToggle.type = "button";
        expToggle.className = "explanation-toggle";
        expToggle.addEventListener("click", () => toggleExplanation(qIndex, expToggle));

        buttonsWrapper.appendChild(checkBtn);
        buttonsWrapper.appendChild(expToggle);

        feedbackRow.appendChild(feedback);
        feedbackRow.appendChild(buttonsWrapper);

        // Explanation box
        const explanation = document.createElement("div");
        explanation.className = "explanation";
        explanation.id = `exp-${qIndex}`;
        explanation.textContent = q.explanation;

        // Assemble card
        card.appendChild(header);
        card.appendChild(qText);
        card.appendChild(optionsDiv);
        card.appendChild(feedbackRow);
        card.appendChild(explanation);

        quizDiv.appendChild(card);
      });
    }
    function checkQuestion(qIndex) {
      const card = document.getElementsByClassName("question-card")[qIndex];
      const correctIndex = parseInt(card.dataset.correctIndex, 10);
      const radios = card.querySelectorAll("input[type='radio']");
      const feedback = document.getElementById(`feedback-${qIndex}`);

      let selectedIndex = -1;
      radios.forEach((r, idx) => {
        if (r.checked) selectedIndex = idx;
      });

      const optionDivs = card.getElementsByClassName("option");
      Array.from(optionDivs).forEach(div => {
        div.classList.remove("correct-selected", "incorrect-selected");
      });

      if (selectedIndex === -1) {
        feedback.textContent = "Select an answer before checking.";
        feedback.className = "feedback incorrect";
        return;
      }

      if (selectedIndex === correctIndex) {
        feedback.textContent = "Correct!";
        feedback.className = "feedback correct";
        optionDivs[selectedIndex].classList.add("correct-selected");
      } else {
        feedback.textContent = "Incorrect. Review the explanation.";
        feedback.className = "feedback incorrect";
        optionDivs[selectedIndex].classList.add("incorrect-selected");
        optionDivs[correctIndex].classList.add("correct-selected");
      }
    }

    function gradeQuiz() {
      const cards = document.getElementsByClassName("question-card");
      let correctCount = 0;
      let answeredCount = 0;

      Array.from(cards).forEach((card, qIndex) => {
        const correctIndex = parseInt(card.dataset.correctIndex, 10);
        const radios = card.querySelectorAll("input[type='radio']");
        let selectedIndex = -1;

        radios.forEach((r, idx) => {
          if (r.checked) selectedIndex = idx;
        });

        if (selectedIndex !== -1) {
          answeredCount++;
          if (selectedIndex === correctIndex) {
            correctCount++;
          }
        }

        checkQuestion(qIndex);
      });

      const total = cards.length;
      const scoreBox = document.getElementById("scoreBox");
      const scoreText = document.getElementById("scoreText");

      scoreText.textContent = `${correctCount} / ${total} correct (answered ${answeredCount} of ${total})`;
      scoreBox.style.display = "block";
    }

    function toggleExplanation(qIndex, btn) {
      const exp = document.getElementById(`exp-${qIndex}`);
      if (!exp) return;

      const isHidden = exp.style.display === "none" || exp.style.display === "";
      exp.style.display = isHidden ? "block" : "none";
      btn.textContent = isHidden ? "Hide Explanation" : "Show Explanation";
    }

    function showAllExplanations() {
      const exps = document.getElementsByClassName("explanation");
      Array.from(exps).forEach(exp => {
        exp.style.display = "block";
      });

      const toggles = document.getElementsByClassName("explanation-toggle");
      Array.from(toggles).forEach(btn => {
        btn.textContent = "Hide Explanation";
      });
    }

    function hideAllExplanations() {
      const exps = document.getElementsByClassName("explanation");
      Array.from(exps).forEach(exp => {
        exp.style.display = "none";
      });

      const toggles = document.getElementsByClassName("explanation-toggle");
      Array.from(toggles).forEach(btn => {
        btn.textContent = "Show Explanation";
      });
    }
    // Event listeners
    document.getElementById("shuffleBtn").addEventListener("click", () => {
      buildQuiz();
      document.getElementById("scoreBox").style.display = "none";
    });

    document.getElementById("gradeBtn").addEventListener("click", gradeQuiz);
    document.getElementById("showAllExpBtn").addEventListener("click", showAllExplanations);
    document.getElementById("hideAllExpBtn").addEventListener("click", hideAllExplanations);

    // Build quiz on page load
    buildQuiz();

  }); // END DOMContentLoaded
  </script>
</body>
</html>
