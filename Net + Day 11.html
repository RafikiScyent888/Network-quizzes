<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CompTIA Network+ Practice Quiz - Saved Format</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: #0d1b2f;
      --panel-2: #10223c;
      --text: #e8eefc;
      --muted: #9fb0d1;
      --accent: #7fb3ff;
      --accent-2: #9ad0ff;
      --good: #7ee081;
      --bad: #ff8f8f;
      --border: #223a63;
      --shadow: 0 10px 30px rgba(0,0,0,.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #06101d 0%, #0b1830 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
    }
    .card {
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 24px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 2rem;
    }
    .sub {
      color: var(--muted);
      margin-bottom: 18px;
    }
    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }
    .pill {
      background: rgba(127, 179, 255, 0.08);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.95rem;
    }
    .progress-wrap {
      width: 100%;
      height: 12px;
      background: #07101e;
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
      margin: 16px 0 24px;
    }
    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width .25s ease;
    }
    .question-number {
      color: var(--accent-2);
      font-size: 0.95rem;
      margin-bottom: 8px;
      letter-spacing: .03em;
    }
    .question-text {
      font-size: 1.18rem;
      line-height: 1.55;
      margin-bottom: 20px;
      font-weight: 700;
    }
    .options {
      display: grid;
      gap: 12px;
    }
    .option {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      cursor: pointer;
      transition: transform .08s ease, border-color .15s ease, background .15s ease;
    }
    .option:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
      background: rgba(127,179,255,.07);
    }
    .option input {
      margin-top: 3px;
      transform: scale(1.15);
    }
    .option code {
      font-family: "Courier New", Courier, monospace;
      white-space: pre;
      color: var(--text);
      font-size: 0.98rem;
      line-height: 1.5;
    }
    .feedback {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 12px;
      display: none;
      font-weight: 700;
    }
    .feedback.good {
      display: block;
      background: rgba(126, 224, 129, 0.10);
      border: 1px solid rgba(126, 224, 129, 0.35);
      color: var(--good);
    }
    .feedback.bad {
      display: block;
      background: rgba(255, 143, 143, 0.10);
      border: 1px solid rgba(255, 143, 143, 0.35);
      color: var(--bad);
    }
    details {
      margin-top: 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      overflow: hidden;
      display: none;
    }
    details.show {
      display: block;
    }
    summary {
      cursor: pointer;
      padding: 12px 14px;
      color: var(--accent-2);
      font-weight: 700;
      user-select: none;
    }
    .explanation {
      padding: 0 14px 14px;
      color: var(--text);
      line-height: 1.55;
    }
    .controls {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    button {
      appearance: none;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, #17335d 0%, #122949 100%);
      color: var(--text);
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    button[disabled] {
      opacity: .5;
      cursor: not-allowed;
    }
    .secondary {
      background: linear-gradient(180deg, #101c31 0%, #0b1424 100%);
    }
    .result {
      display: none;
      margin-top: 18px;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(127,179,255,.07);
    }
    .result.show { display: block; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>CompTIA Network+ Practice Quiz</h1>
      <div class="sub">Network Monitoring &amp; Disaster Recovery Concepts – CompTIA Word‑Salad Edition (30 Questions)</div>

      <div class="topbar">
        <div class="pill" id="scorePill">Score: 0 / 0</div>
        <div class="pill" id="progressPill">Question 1 / 1</div>
      </div>
      <div class="progress-wrap"><div class="progress" id="progressBar"></div></div>

      <div id="quizArea"></div>

      <div class="controls">
        <button id="nextBtn" disabled>Next</button>
        <button id="restartBtn" class="secondary">Restart</button>
      </div>

      <div class="result" id="resultBox"></div>
    </div>
  </div>

<script>
const QUESTIONS = [
  {
    q: "A network administrator needs to track long-term performance trends, identify anomalies, and compare current behavior against historical norms. Which monitoring concept is being used?",
    a: ["Baseline", "Threshold alerting", "system logging (Syslog) correlation", "Simple Network Management Protocol (SNMP) trap analysis"],
    c: 0,
    e: "Baselines establish normal performance levels for comparison."
  },
  {
    q: "A monitoring system must notify administrators immediately when central processing unit (CPU) utilization exceeds 90% for more than 5 minutes. Which feature provides this functionality?",
    a: ["Threshold alerting", "Baseline reporting", "Packet capture", "system logging (Syslog) archiving"],
    c: 0,
    e: "Threshold alerts trigger notifications when metrics exceed defined limits."
  },
  {
    q: "A technician needs to collect interface statistics, bandwidth usage, and error counters from switches and routers. Which protocol is MOST appropriate?",
    a: ["Simple Network Management Protocol (SNMP)", "system logging (Syslog)", "NetFlow", "Network Time Protocol (NTP)"],
    c: 0,
    e: "Simple Network Management Protocol (SNMP) retrieves device metrics and performance counters."
  },
  {
    q: "A network engineer wants to analyze traffic flows, including source/destination pairs and byte counts, to identify unusual patterns. Which technology provides this?",
    a: ["NetFlow/Internet Protocol Flow Information Export (IPFIX)", "Simple Network Management Protocol (SNMP)", "system logging (Syslog)", "Traceroute"],
    c: 0,
    e: "NetFlow and Internet Protocol Flow Information Export (IPFIX) provide flow-level traffic analytics."
  },
  {
    q: "A centralized system collects log messages from routers, switches, firewalls, and servers for correlation and analysis. Which service is being used?",
    a: ["system logging (Syslog)", "Simple Network Management Protocol (SNMP)", "Network Time Protocol (NTP)", "Dynamic Host Configuration Protocol (DHCP)"],
    c: 0,
    e: "system logging (Syslog) centralizes log messages from network devices."
  },
  {
    q: "A technician needs to determine whether a network outage occurred at a specific time by reviewing historical logs. Which tool is MOST appropriate?",
    a: ["system logging (Syslog) server", "Packet sniffer", "Simple Network Management Protocol (SNMP) manager", "NetFlow collector"],
    c: 0,
    e: "system logging (Syslog) servers store historical logs for review."
  },
  {
    q: "A network administrator wants to ensure accurate timestamps across all logs for correlation. Which protocol provides this?",
    a: ["Network Time Protocol (NTP)", "Simple Network Management Protocol (SNMP)", "system logging (Syslog)", "Domain Name System (DNS)"],
    c: 0,
    e: "Network Time Protocol (NTP) synchronizes time across devices."
  },
  {
    q: "A monitoring system receives unsolicited notifications from devices when critical events occur. What are these notifications called?",
    a: ["Simple Network Management Protocol (SNMP) traps", "system logging (Syslog) alerts", "Threshold breaches", "Flow records"],
    c: 0,
    e: "Simple Network Management Protocol (SNMP) traps are unsolicited alerts sent by agents."
  },
  {
    q: "A technician needs to capture packets to troubleshoot intermittent connectivity issues. Which tool is MOST appropriate?",
    a: ["Protocol analyzer", "system logging (Syslog) server", "Simple Network Management Protocol (SNMP) manager", "NetFlow collector"],
    c: 0,
    e: "Protocol analyzers capture and decode packets."
  },
  {
    q: "A network engineer wants to identify the root cause of a performance issue by analyzing error counters and interface statistics. Which monitoring method is used?",
    a: ["Simple Network Management Protocol (SNMP) polling", "system logging (Syslog) parsing", "Packet capture", "Flow analysis"],
    c: 0,
    e: "Simple Network Management Protocol (SNMP) polling retrieves interface statistics and counters."
  },
  {
    q: "A company needs to ensure that critical services remain available even if a primary server fails. Which concept addresses this requirement?",
    a: ["Redundancy", "Baseline", "system logging (Syslog) retention", "Traffic shaping"],
    c: 0,
    e: "Redundancy ensures continued operation during failures."
  },
  {
    q: "A technician configures a secondary router to automatically take over if the primary router fails. Which disaster recovery concept is being implemented?",
    a: ["Failover", "Load balancing", "Clustering", "Snapshotting"],
    c: 0,
    e: "Failover automatically switches to a backup device."
  },
  {
    q: "A company wants to minimize the amount of data lost during a disaster. Which metric measures acceptable data loss?",
    a: ["recovery point objective (RPO)", "recovery time objective (RTO)", "mean time between failures (MTBF)", "mean time to repair (MTTR)"],
    c: 0,
    e: "recovery point objective (RPO) defines how much data loss is acceptable."
  },
  {
    q: "A business needs to restore critical services within 2 hours after a disaster. Which metric defines this requirement?",
    a: ["recovery time objective (RTO)", "recovery point objective (RPO)", "mean time between failures (MTBF)", "mean time to repair (MTTR)"],
    c: 0,
    e: "recovery time objective (RTO) defines how quickly services must be restored."
  },
  {
    q: "A technician performs nightly backups and stores them offsite to protect against catastrophic loss. Which strategy is being used?",
    a: ["Disaster recovery planning", "Load balancing", "Baseline creation", "Traffic shaping"],
    c: 0,
    e: "Offsite backups are part of disaster recovery planning."
  },
  {
    q: "A company uses a combination of full backups on weekends and incremental backups on weekdays. Which backup strategy is this?",
    a: ["Hybrid backup", "Differential-only", "Snapshot-only", "Continuous replication"],
    c: 0,
    e: "Hybrid strategies combine full and incremental backups."
  },
  {
    q: "A technician needs to restore a system to the exact state it was in at a specific point in time. Which backup type is MOST appropriate?",
    a: ["Snapshot", "Incremental", "Differential", "Bare-metal"],
    c: 0,
    e: "Snapshots capture the system state at a moment in time."
  },
  {
    q: "A company replicates data in real time to a secondary data center. Which disaster recovery method is being used?",
    a: ["Hot site", "Warm site", "Cold site", "Incremental backup"],
    c: 0,
    e: "Hot sites maintain real-time replication and immediate failover capability."
  },
  {
    q: "A disaster recovery site has hardware installed but requires data restoration before becoming operational. Which type of site is this?",
    a: ["Warm site", "Hot site", "Cold site", "Hybrid site"],
    c: 0,
    e: "Warm sites have hardware ready but require data restoration."
  },
  {
    q: "A company maintains an empty facility with power and cooling but no hardware installed. Which type of disaster recovery (DR) site is this?",
    a: ["Cold site", "Warm site", "Hot site", "Hybrid site"],
    c: 0,
    e: "Cold sites have infrastructure but no equipment."
  },
  {
    q: "A technician needs to verify that backup files can be restored successfully. Which process is being performed?",
    a: ["Backup testing", "Baseline validation", "Failover simulation", "Log correlation"],
    c: 0,
    e: "Backup testing ensures restorability."
  },
  {
    q: "A company wants to ensure that critical applications remain available even during maintenance windows. Which concept supports this?",
    a: ["High availability", "Cold site", "Baseline reporting", "Traffic policing"],
    c: 0,
    e: "High availability ensures continuous uptime."
  },
  {
    q: "A network engineer configures multiple servers to share workload and improve performance. Which concept is being used?",
    a: ["Load balancing", "Failover", "Clustering", "Snapshotting"],
    c: 0,
    e: "Load balancing distributes traffic across multiple servers."
  },
  {
    q: "A technician needs to identify unusual spikes in bandwidth usage. Which monitoring tool is MOST appropriate?",
    a: ["NetFlow analyzer", "system logging (Syslog) server", "Network Time Protocol (NTP) server", "Dynamic Host Configuration Protocol (DHCP) logs"],
    c: 0,
    e: "NetFlow provides traffic flow visibility."
  },
  {
    q: "A company wants to ensure that logs are retained for compliance and forensic analysis. Which concept applies?",
    a: ["Log retention policy", "Baseline creation", "Failover planning", "Snapshot rotation"],
    c: 0,
    e: "Log retention policies define how long logs must be stored."
  },
  {
    q: "A technician needs to identify the root cause of a network outage by reviewing event messages from multiple devices. Which tool is MOST appropriate?",
    a: ["security information and event management (SIEM)", "Packet sniffer", "NetFlow collector", "Network Time Protocol (NTP) server"],
    c: 0,
    e: "security information and event management (SIEM) systems correlate logs from multiple sources."
  },
  {
    q: "A company wants to reduce downtime by having a secondary system ready to take over instantly. Which concept supports this?",
    a: ["Hot standby", "Cold site", "Incremental backup", "Baseline monitoring"],
    c: 0,
    e: "Hot standby systems are ready for immediate failover."
  },
  {
    q: "A technician needs to determine how long a device typically operates before failing. Which metric is used?",
    a: ["mean time between failures (MTBF)", "mean time to repair (MTTR)", "recovery time objective (RTO)", "recovery point objective (RPO)"],
    c: 0,
    e: "mean time between failures (MTBF) measures average time between failures."
  },
  {
    q: "A network engineer wants to measure how long it takes to repair a failed device. Which metric applies?",
    a: ["mean time to repair (MTTR)", "mean time between failures (MTBF)", "recovery time objective (RTO)", "recovery point objective (RPO)"],
    c: 0,
    e: "mean time to repair (MTTR) measures repair time."
  },
  {
    q: "A company performs a simulated disaster scenario to test its recovery procedures. Which process is this?",
    a: ["disaster recovery (DR) drill", "Baseline validation", "Failover rotation", "Log correlation"],
    c: 0,
    e: "disaster recovery (DR) drills test disaster recovery readiness."
  }
];

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function ensurePeriod(s) {
  s = String(s).trim();
  return /[.!?]$/.test(s) ? s : s + ".";
}

function padOptions(options) {
  const normalized = options.map(ensurePeriod);
  const maxLen = Math.max(...normalized.map(s => s.length));
  return normalized.map(s => s + "\u00A0".repeat(maxLen - s.length));
}

let state = {
  questions: [],
  index: 0,
  score: 0,
  answered: false
};

function prepareQuestions() {
  const qList = QUESTIONS.map(q => {
    const correct = ensurePeriod(q.a[q.c]);
    const answers = q.a.map(a => ensurePeriod(a));
    const paired = answers.map((ans, idx) => ({ ans, isCorrect: idx === q.c }));
    shuffle(paired);
    return {
      q: q.q,
      e: q.e,
      answers: paired
    };
  });
  shuffle(qList);
  return qList;
}

function renderQuestion() {
  const quizArea = document.getElementById("quizArea");
  const progressBar = document.getElementById("progressBar");
  const scorePill = document.getElementById("scorePill");
  const progressPill = document.getElementById("progressPill");
  const nextBtn = document.getElementById("nextBtn");
  const resultBox = document.getElementById("resultBox");

  nextBtn.disabled = true;
  resultBox.classList.remove("show");

  if (state.index >= state.questions.length) {
    quizArea.innerHTML = "";
    progressBar.style.width = "100%";
    scorePill.textContent = `Score: ${state.score} / ${state.questions.length}`;
    progressPill.textContent = `Completed: ${state.questions.length} / ${state.questions.length}`;
    resultBox.innerHTML = `<strong>Finished.</strong><br>Your score: <strong>${state.score} / ${state.questions.length}</strong>.`;
    resultBox.classList.add("show");
    return;
  }

  const item = state.questions[state.index];
  const displayAnswers = padOptions(item.answers.map(x => x.ans));

  progressBar.style.width = `${(state.index / state.questions.length) * 100}%`;
  scorePill.textContent = `Score: ${state.score} / ${state.index}`;
  progressPill.textContent = `Question ${state.index + 1} / ${state.questions.length}`;

  quizArea.innerHTML = `
    <div class="question-number">Question ${state.index + 1}</div>
    <div class="question-text">${item.q}</div>
    <div class="options">
      ${item.answers.map((obj, i) => `
        <label class="option">
          <input type="radio" name="answer" value="${i}">
          <code>${String.fromCharCode(65 + i)}) ${displayAnswers[i]}</code>
        </label>
      `).join("")}
    </div>
    <div id="feedback" class="feedback"></div>
    <details id="explainBox">
      <summary>Explanation</summary>
      <div class="explanation">${item.e}</div>
    </details>
  `;

  state.answered = false;

  document.querySelectorAll('input[name="answer"]').forEach((input) => {
    input.addEventListener("change", () => {
      if (state.answered) return;
      state.answered = true;
      const chosen = Number(input.value);
      const correct = item.answers[chosen].isCorrect;
      const feedback = document.getElementById("feedback");
      const explainBox = document.getElementById("explainBox");

      if (correct) {
        state.score += 1;
        feedback.textContent = "Correct.";
        feedback.className = "feedback good";
      } else {
        feedback.textContent = "Incorrect.";
        feedback.className = "feedback bad";
      }

      explainBox.classList.add("show");
      nextBtn.disabled = false;

      document.querySelectorAll('input[name="answer"]').forEach((el) => el.disabled = true);
      document.getElementById("scorePill").textContent = `Score: ${state.score} / ${state.index + 1}`;
    });
  });
}

function restartQuiz() {
  state.questions = prepareQuestions();
  state.index = 0;
  state.score = 0;
  state.answered = false;
  renderQuestion();
}

document.getElementById("nextBtn").addEventListener("click", () => {
  if (!state.answered) return;
  state.index += 1;
  renderQuestion();
});

document.getElementById("restartBtn").addEventListener("click", restartQuiz);

restartQuiz();
</script>
</body>
</html>
