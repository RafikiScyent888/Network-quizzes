<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Network+ – Day 10 | Saved Quiz Format</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: #0d1830;
      --panel-2: #122142;
      --line: #23365f;
      --text: #e9eefc;
      --muted: #9eb0d8;
      --accent: #7fb0ff;
      --accent-2: #b9d2ff;
      --good: #77d39a;
      --bad: #ff9b9b;
      --warn: #ffd37a;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      --radius: 18px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      --sans: Inter, Segoe UI, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--sans);
      background:
        radial-gradient(circle at top, rgba(127,176,255,0.08), transparent 28%),
        linear-gradient(180deg, #07101d 0%, #08111f 100%);
      color: var(--text);
      padding: 24px;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
    }

    .hero,
    .card,
    .results {
      background: linear-gradient(180deg, rgba(18,33,66,0.96), rgba(10,21,42,0.98));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 24px;
      margin-bottom: 18px;
    }

    .eyebrow {
      font-size: 0.86rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 2.2vw, 2.4rem);
      line-height: 1.15;
    }

    .subtitle {
      color: var(--muted);
      margin: 0;
      font-size: 1rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .stat {
      background: rgba(6, 15, 31, 0.55);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 6px;
    }

    .stat-value {
      font-weight: 800;
      font-size: 1.08rem;
    }

    .progress-shell {
      margin: 18px 0 16px;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 0.25s ease;
    }

    .card {
      padding: 22px;
    }

    .question-number {
      color: var(--accent);
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .question-text {
      font-size: 1.12rem;
      line-height: 1.55;
      margin-bottom: 18px;
      font-weight: 650;
    }

    .options {
      display: grid;
      gap: 12px;
    }

    .option {
      border: 1px solid var(--line);
      background: rgba(8, 17, 31, 0.78);
      border-radius: 14px;
      padding: 0;
      overflow: hidden;
      transition: border-color 0.18s ease, transform 0.18s ease, background 0.18s ease;
    }

    .option:hover {
      border-color: #4f72b8;
      transform: translateY(-1px);
    }

    .option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .option label {
      display: block;
      width: 100%;
      padding: 14px 16px;
      cursor: pointer;
    }

    .option-text {
      display: block;
      white-space: pre;
      font-family: var(--mono);
      font-size: 0.98rem;
      line-height: 1.4;
      color: var(--text);
    }

    .option.selected {
      border-color: var(--accent);
      background: rgba(18, 40, 78, 0.9);
    }

    .option.locked label {
      cursor: default;
    }

    .feedback {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid transparent;
      display: none;
      line-height: 1.45;
    }

    .feedback.good {
      display: block;
      background: rgba(49, 111, 71, 0.18);
      border-color: rgba(119, 211, 154, 0.34);
      color: #d9ffe6;
    }

    .feedback.bad {
      display: block;
      background: rgba(112, 44, 44, 0.18);
      border-color: rgba(255, 155, 155, 0.30);
      color: #ffe1e1;
    }

    details.explainer {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      overflow: hidden;
      display: none;
    }

    details.explainer.visible {
      display: block;
    }

    details.explainer summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      font-weight: 700;
      color: var(--accent-2);
    }

    details.explainer summary::-webkit-details-marker { display: none; }

    .explanation-body {
      padding: 0 16px 16px;
      color: #d8e3ff;
      line-height: 1.55;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .nav-left {
      color: var(--muted);
      font-size: 0.94rem;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #1a2e59, #14264c);
      color: var(--text);
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, opacity 0.16s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: #5f83c7;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .secondary {
      background: rgba(255,255,255,0.04);
    }

    .results {
      display: none;
      margin-top: 18px;
      padding: 24px;
    }

    .results h2 {
      margin-top: 0;
      margin-bottom: 8px;
    }

    .results p {
      color: var(--muted);
      line-height: 1.55;
    }

    .review-list {
      margin-top: 18px;
      display: grid;
      gap: 12px;
    }

    .review-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.03);
    }

    .review-item.good { border-color: rgba(119, 211, 154, 0.35); }
    .review-item.bad  { border-color: rgba(255, 155, 155, 0.28); }

    .review-q {
      font-weight: 700;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .review-line {
      color: var(--muted);
      font-family: var(--mono);
      white-space: pre-wrap;
      line-height: 1.5;
      margin-bottom: 6px;
    }

    @media (max-width: 720px) {
      body { padding: 14px; }
      .hero, .card, .results { padding: 18px; }
      .stats { grid-template-columns: 1fr; }
      .option-text { font-size: 0.92rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="eyebrow">Exam Mode</div>
      <h1>CompTIA Network+ Practice Quiz</h1>
      <p class="subtitle">Day 10 · Common Network Attack Types · 30 questions · one at a time.</p>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">Format</div>
          <div class="stat-value">Saved quiz engine</div>
        </div>
        <div class="stat">
          <div class="stat-label">Flow</div>
          <div class="stat-value">Shuffle + instant feedback</div>
        </div>
        <div class="stat">
          <div class="stat-label">Explanations</div>
          <div class="stat-value">Collapsible</div>
        </div>
      </div>
    </section>

    <section class="card" id="quizCard">
      <div class="progress-shell">
        <div class="progress-row">
          <div id="progressText">Question 1 of 30</div>
          <div id="scoreText">Score: 0 / 0</div>
        </div>
        <div class="progress-bar" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="question-number" id="questionNumber">Question 1</div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>

      <details class="explainer" id="explainer">
        <summary>Explanation</summary>
        <div class="explanation-body" id="explanationBody"></div>
      </details>

      <div class="nav">
        <div class="nav-left" id="navHint">Choose one answer.</div>
        <div>
          <button class="secondary" id="restartBtn" type="button">Restart</button>
          <button id="nextBtn" type="button" disabled>Next</button>
        </div>
      </div>
    </section>

    <section class="results" id="results"></section>
  </div>

  <script>
    const RAW_QUESTIONS = [
      {
            "q": "An attacker forges the source Internet Protocol (IP) address of packets so traffic appears to come from a trusted host. Which attack type BEST matches this behavior?",
            "a": [
                  "IP spoofing.",
                  "MAC spoofing.",
                  "Address Resolution Protocol (ARP) poisoning.",
                  "Domain Name System (DNS) poisoning."
            ],
            "c": 0,
            "e": "IP spoofing falsifies the source Internet Protocol (IP) address so packets appear to originate from another system."
      },
      {
            "q": "A threat actor overwhelms a web server with excessive Transmission Control Protocol (TCP) synchronization packets but never completes the handshake, exhausting resources. Which attack is being performed?",
            "a": [
                  "SYN flood.",
                  "Distributed denial-of-service (DDoS).",
                  "Smurf attack.",
                  "Replay attack."
            ],
            "c": 0,
            "e": "A SYN flood sends many TCP SYN packets without completing the three-way handshake, consuming server state and resources."
      },
      {
            "q": "A malicious user intercepts traffic between two hosts and secretly alters the data before forwarding it. Which attack type is occurring?",
            "a": [
                  "Man-in-the-middle (MITM).",
                  "Replay attack.",
                  "Session hijacking.",
                  "IP spoofing."
            ],
            "c": 0,
            "e": "A man-in-the-middle attack places the attacker between two communicating parties so traffic can be intercepted and manipulated."
      },
      {
            "q": "A user receives an email that appears to come from corporate Information Technology (IT) and asks them to verify their password on a fake website. What attack is this?",
            "a": [
                  "Phishing.",
                  "Smishing.",
                  "Vishing.",
                  "Spear phishing."
            ],
            "c": 0,
            "e": "Phishing uses fraudulent email messages and links to trick users into revealing credentials or other sensitive data."
      },
      {
            "q": "An attacker sends gratuitous Address Resolution Protocol (ARP) replies that map the default gateway Internet Protocol (IP) address to the attacker's media access control (MAC) address. Which attack is being executed?",
            "a": [
                  "ARP poisoning.",
                  "MAC spoofing.",
                  "Internet Protocol (IP) spoofing.",
                  "Domain Name System (DNS) hijacking."
            ],
            "c": 0,
            "e": "ARP poisoning corrupts local ARP caches so traffic intended for another device is redirected through the attacker."
      },
      {
            "q": "A wireless attacker captures authentication handshakes and then tries a huge number of possible passwords offline until one works. Which attack type is this?",
            "a": [
                  "Brute-force attack.",
                  "Dictionary attack.",
                  "Deauthentication attack.",
                  "Evil twin attack."
            ],
            "c": 0,
            "e": "A brute-force attack systematically tries all possible values or a very large keyspace until the correct credential is found."
      },
      {
            "q": "A malicious actor sets up a wireless access point that copies the service set identifier (SSID) of a legitimate network to lure users into connecting. What attack is this?",
            "a": [
                  "Evil twin.",
                  "Rogue access point.",
                  "Deauthentication attack.",
                  "Captive portal spoofing."
            ],
            "c": 0,
            "e": "An evil twin impersonates a legitimate wireless network so victims associate with the attacker's access point."
      },
      {
            "q": "A threat actor floods a switch with thousands of fake media access control (MAC) addresses so the switch begins forwarding frames out many ports. Which attack is being used?",
            "a": [
                  "MAC flooding.",
                  "MAC spoofing.",
                  "ARP poisoning.",
                  "Broadcast storming."
            ],
            "c": 0,
            "e": "MAC flooding overwhelms the switch content-addressable memory table so the switch may start flooding traffic like a hub."
      },
      {
            "q": "A malicious user repeatedly sends spoofed deauthentication frames to disconnect wireless clients from their access point. Which attack is this?",
            "a": [
                  "Deauthentication attack.",
                  "Jamming.",
                  "Evil twin.",
                  "Disassociation monitoring."
            ],
            "c": 0,
            "e": "A deauthentication attack forces clients off the network by sending forged management frames that tell them to disconnect."
      },
      {
            "q": "An attacker corrupts name-resolution data so users trying to reach a legitimate website are redirected to a malicious Internet Protocol (IP) address. Which attack is being performed?",
            "a": [
                  "Domain Name System (DNS) poisoning.",
                  "Domain Name System (DNS) amplification.",
                  "Address Resolution Protocol (ARP) poisoning.",
                  "IP spoofing."
            ],
            "c": 0,
            "e": "DNS poisoning tampers with cached or authoritative name-resolution data so victims are sent to attacker-controlled destinations."
      },
      {
            "q": "A threat actor captures legitimate authentication traffic and later retransmits it to gain unauthorized access. Which attack type is this?",
            "a": [
                  "Replay attack.",
                  "Man-in-the-middle (MITM).",
                  "Session fixation.",
                  "Brute-force attack."
            ],
            "c": 0,
            "e": "A replay attack reuses previously captured valid traffic, such as authentication exchanges, to impersonate an authorized user or device."
      },
      {
            "q": "A malicious user drives around neighborhoods searching for open or weak wireless networks. Which technique is this?",
            "a": [
                  "War driving.",
                  "War chalking.",
                  "Site surveying.",
                  "Bluejacking."
            ],
            "c": 0,
            "e": "War driving is the act of moving through an area while detecting and mapping wireless networks."
      },
      {
            "q": "An attacker sends Internet Control Message Protocol (ICMP) echo requests to a broadcast address while spoofing the victim's Internet Protocol (IP) address as the source. Which attack is this?",
            "a": [
                  "Smurf attack.",
                  "SYN flood.",
                  "Ping flood.",
                  "Reflection attack."
            ],
            "c": 0,
            "e": "A Smurf attack amplifies ICMP traffic by sending spoofed requests to broadcast-capable networks so many hosts reply to the victim."
      },
      {
            "q": "A malicious actor sends unsolicited Bluetooth messages to nearby devices but does not steal data. Which attack is this?",
            "a": [
                  "Bluejacking.",
                  "Bluesnarfing.",
                  "Bluebugging.",
                  "Near-field communication skimming."
            ],
            "c": 0,
            "e": "Bluejacking pushes unsolicited Bluetooth messages or business cards to nearby devices without necessarily accessing stored data."
      },
      {
            "q": "A Bluetooth attacker connects to a nearby device and steals contacts or messages without authorization. Which attack is this?",
            "a": [
                  "Bluesnarfing.",
                  "Bluejacking.",
                  "Bluebugging.",
                  "Evil twin."
            ],
            "c": 0,
            "e": "Bluesnarfing is unauthorized access to information stored on a Bluetooth-enabled device."
      },
      {
            "q": "A threat actor disrupts a wireless network by transmitting continuous radio frequency interference across the channel. Which attack is being executed?",
            "a": [
                  "Jamming.",
                  "Deauthentication attack.",
                  "Evil twin.",
                  "War driving."
            ],
            "c": 0,
            "e": "Jamming interferes with wireless communications by overwhelming the radio frequency spectrum used by legitimate devices."
      },
      {
            "q": "An attacker follows an authorized employee through a secured door without using a badge or authentication. Which attack is this?",
            "a": [
                  "Tailgating.",
                  "Shoulder surfing.",
                  "Phishing.",
                  "Impersonation."
            ],
            "c": 0,
            "e": "Tailgating is a physical security attack in which an unauthorized person follows an authorized user into a restricted area."
      },
      {
            "q": "A malicious user marks sidewalks or buildings with symbols that describe nearby wireless network characteristics for other attackers. Which technique is this?",
            "a": [
                  "War chalking.",
                  "War driving.",
                  "Bluejacking.",
                  "Site surveying."
            ],
            "c": 0,
            "e": "War chalking uses physical symbols to advertise wireless network details such as openness or security level."
      },
      {
            "q": "A threat actor changes their network interface so it uses another device's media access control (MAC) address. Which attack type is this?",
            "a": [
                  "MAC spoofing.",
                  "MAC flooding.",
                  "ARP poisoning.",
                  "IP spoofing."
            ],
            "c": 0,
            "e": "MAC spoofing alters the hardware address presented by a device so it appears to be another endpoint on the local network."
      },
      {
            "q": "A malicious user sends fraudulent Short Message Service (SMS) messages to convince victims to reveal credentials or financial data. Which attack is this?",
            "a": [
                  "Smishing.",
                  "Phishing.",
                  "Vishing.",
                  "Pretexting."
            ],
            "c": 0,
            "e": "Smishing is phishing conducted through text messages rather than email."
      },
      {
            "q": "A threat actor places voice calls that appear to come from a trusted organization and pressures the victim to disclose sensitive information. Which attack is this?",
            "a": [
                  "Vishing.",
                  "Phishing.",
                  "Smishing.",
                  "Whaling."
            ],
            "c": 0,
            "e": "Vishing is voice-based social engineering, usually delivered through phone or Voice over Internet Protocol (VoIP) calls."
      },
      {
            "q": "An attacker injects malicious script into a trusted website so the code runs in visitors' browsers. Which attack is this?",
            "a": [
                  "Cross-site scripting (XSS).",
                  "Structured Query Language (SQL) injection.",
                  "Command injection.",
                  "Cross-site request forgery (CSRF)."
            ],
            "c": 0,
            "e": "Cross-site scripting injects client-side code into a web page so the victim's browser executes it."
      },
      {
            "q": "A threat actor manipulates backend database queries by placing crafted input into a web form. Which attack is this?",
            "a": [
                  "Structured Query Language (SQL) injection.",
                  "Cross-site scripting (XSS).",
                  "Command injection.",
                  "Buffer overflow."
            ],
            "c": 0,
            "e": "SQL injection inserts malicious input into application fields so the backend database executes unintended queries."
      },
      {
            "q": "A malicious user installs unauthorized hardware on the network to capture or redirect traffic. Which attack is this?",
            "a": [
                  "Rogue device.",
                  "Rogue access point.",
                  "Man-in-the-middle (MITM).",
                  "Port mirroring abuse."
            ],
            "c": 0,
            "e": "A rogue device is unauthorized hardware placed on the network, often to observe, manipulate, or pivot through traffic."
      },
      {
            "q": "A threat actor uses a single compromised host under remote control to launch attacks while concealing the real source. Which term describes that compromised system?",
            "a": [
                  "Zombie.",
                  "Botnet.",
                  "Agentless node.",
                  "Rogue host."
            ],
            "c": 0,
            "e": "A zombie is one compromised system under attacker control that can be directed to participate in malicious activity."
      },
      {
            "q": "A large group of compromised hosts is centrally controlled and used to launch coordinated attacks. What is this called?",
            "a": [
                  "Botnet.",
                  "Zombie.",
                  "Peer group.",
                  "Server farm."
            ],
            "c": 0,
            "e": "A botnet is a collection of compromised systems that an attacker controls as a group."
      },
      {
            "q": "A threat actor attempts to guess an account password by trying every possible combination until one succeeds. Which attack is this?",
            "a": [
                  "Brute-force attack.",
                  "Dictionary attack.",
                  "Password spraying.",
                  "Replay attack."
            ],
            "c": 0,
            "e": "A brute-force attack exhaustively tries combinations until the correct password is found."
      },
      {
            "q": "An attacker attempts unauthorized access by testing a list of common words and known weak passwords rather than every possible combination. Which attack is this?",
            "a": [
                  "Dictionary attack.",
                  "Brute-force attack.",
                  "Password spraying.",
                  "Credential stuffing."
            ],
            "c": 0,
            "e": "A dictionary attack uses a predefined wordlist of likely passwords instead of testing the full keyspace."
      },
      {
            "q": "A malicious user sends crafted traffic to exploit a service and make it unavailable to legitimate users. Which attack type is this?",
            "a": [
                  "Denial-of-service (DoS).",
                  "Distributed denial-of-service (DDoS).",
                  "SYN flood.",
                  "Resource exhaustion."
            ],
            "c": 0,
            "e": "A denial-of-service attack is any attack intended to disrupt availability for legitimate users, whether by crashing or exhausting the target."
      },
      {
            "q": "A coordinated collection of compromised systems simultaneously overwhelms a target with traffic from many sources. Which attack is this?",
            "a": [
                  "Distributed denial-of-service (DDoS).",
                  "Denial-of-service (DoS).",
                  "Smurf attack.",
                  "SYN flood."
            ],
            "c": 0,
            "e": "A distributed denial-of-service attack uses many systems at once, making the attack harder to block and amplifying its impact."

];

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function padOptions(options) {
      const normalized = options.map(opt => opt.endsWith('.') ? opt : opt + '.');
      const maxLen = Math.max(...normalized.map(opt => opt.length));
      return normalized.map(opt => opt + '\u00A0'.repeat(maxLen - opt.length));
    }

    function buildQuizData(rawQuestions) {
      return shuffle(rawQuestions).map((q) => {
        const correct = q.a[q.c];
        const shuffledOptions = shuffle(q.a);
        const paddedOptions = padOptions(shuffledOptions);
        return {
          question: q.q,
          explanation: q.e,
          correct,
          options: shuffledOptions.map((text, idx) => ({
            raw: text,
            padded: paddedOptions[idx],
            isCorrect: text === correct
          }))
        };
      });
    }

    const state = {
      questions: buildQuizData(RAW_QUESTIONS),
      index: 0,
      score: 0,
      answered: 0,
      locked: false,
      selected: null,
      review: []
    };

    const questionNumber = document.getElementById('questionNumber');
    const questionText = document.getElementById('questionText');
    const optionsEl = document.getElementById('options');
    const feedbackEl = document.getElementById('feedback');
    const explainerEl = document.getElementById('explainer');
    const explanationBody = document.getElementById('explanationBody');
    const nextBtn = document.getElementById('nextBtn');
    const restartBtn = document.getElementById('restartBtn');
    const progressText = document.getElementById('progressText');
    const scoreText = document.getElementById('scoreText');
    const progressFill = document.getElementById('progressFill');
    const navHint = document.getElementById('navHint');
    const quizCard = document.getElementById('quizCard');
    const resultsEl = document.getElementById('results');

    function updateHeader() {
      progressText.textContent = `Question ${state.index + 1} of ${state.questions.length}`;
      scoreText.textContent = `Score: ${state.score} / ${state.answered}`;
      progressFill.style.width = `${(state.index / state.questions.length) * 100}%`;
    }

    function renderQuestion() {
      const item = state.questions[state.index];
      state.locked = false;
      state.selected = null;

      updateHeader();
      resultsEl.style.display = 'none';
      quizCard.style.display = 'block';

      questionNumber.textContent = `Question ${state.index + 1}`;
      questionText.textContent = item.question;
      feedbackEl.className = 'feedback';
      feedbackEl.textContent = '';
      explanationBody.textContent = item.explanation;
      explainerEl.className = 'explainer';
      explainerEl.open = false;
      nextBtn.disabled = true;
      nextBtn.textContent = state.index === state.questions.length - 1 ? 'Finish' : 'Next';
      navHint.textContent = 'Choose one answer for instant feedback.';

      optionsEl.innerHTML = '';

      item.options.forEach((option, idx) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'option';

        const input = document.createElement('input');
        input.type = 'radio';
        input.name = `q-${state.index}`;
        input.id = `q-${state.index}-${idx}`;

        const label = document.createElement('label');
        label.htmlFor = input.id;

        const text = document.createElement('span');
        text.className = 'option-text';
        text.textContent = `${String.fromCharCode(65 + idx)}) ${option.padded}`;

        label.appendChild(text);
        wrapper.appendChild(input);
        wrapper.appendChild(label);

        wrapper.addEventListener('click', () => {
          if (state.locked) return;
          [...optionsEl.children].forEach(el => el.classList.remove('selected'));
          wrapper.classList.add('selected');
          state.selected = option;
          nextBtn.disabled = false;
          navHint.textContent = 'Answer graded instantly.';
          lockAndGrade();
        });

        optionsEl.appendChild(wrapper);
      });
    }

    function lockAndGrade() {
      if (state.locked || !state.selected) return;
      const item = state.questions[state.index];
      state.locked = true;
      state.answered += 1;

      const isCorrect = state.selected.isCorrect;
      if (isCorrect) state.score += 1;

      feedbackEl.className = `feedback ${isCorrect ? 'good' : 'bad'}`;
      feedbackEl.textContent = isCorrect
        ? 'Correct. That choice best fits the objective tested here.'
        : 'Not this one. Focus on the protocol or service role being described, then compare what each option actually does.';

      explainerEl.className = 'explainer visible';
      navHint.textContent = isCorrect
        ? 'Review the explanation, then move to the next question.'
        : 'Open the explanation, then move to the next question.';

      [...optionsEl.children].forEach((el) => el.classList.add('locked'));

      state.review.push({
        question: item.question,
        chosen: state.selected.raw,
        correct: item.correct,
        explanation: item.explanation,
        isCorrect
      });

      scoreText.textContent = `Score: ${state.score} / ${state.answered}`;
      nextBtn.textContent = state.index === state.questions.length - 1 ? 'Finish' : 'Next';
    }

    function nextStep() {
      if (!state.locked) {
        lockAndGrade();
        return;
      }

      if (state.index < state.questions.length - 1) {
        state.index += 1;
        renderQuestion();
      } else {
        renderResults();
      }
    }

    function renderResults() {
      quizCard.style.display = 'none';
      progressFill.style.width = '100%';
      const pct = Math.round((state.score / state.questions.length) * 100);

      const summary = pct >= 90
        ? 'Strong pass. Your recall on these services and management concepts is in good shape.'
        : pct >= 75
          ? 'Solid work. A quick review of missed protocol roles should tighten this up fast.'
          : pct >= 60
            ? 'Decent base. Revisit service purpose, common ports, and what each tool actually measures or configures.'
            : 'Good checkpoint. Slow down on the wording and map each clue to the exact protocol, feature, or document.';

      const reviewHtml = state.review.map((item, idx) => `
        <div class="review-item ${item.isCorrect ? 'good' : 'bad'}">
          <div class="review-q">${idx + 1}. ${escapeHtml(item.question)}</div>
          <div class="review-line">Your answer: ${escapeHtml(item.chosen)}.</div>
          <div class="review-line">Correct answer: ${escapeHtml(item.correct)}.</div>
          <div class="review-line">Why: ${escapeHtml(item.explanation)}</div>
        </div>
      `).join('');

      resultsEl.innerHTML = `
        <h2>Quiz complete</h2>
        <p><strong>Final score:</strong> ${state.score} / ${state.questions.length} (${pct}%).</p>
        <p>${summary}</p>
        <div class="nav" style="margin-top:16px;">
          <div class="nav-left">Per-load shuffle is active, so a restart gives a fresh order.</div>
          <div><button id="resultsRestartBtn" type="button">Restart quiz</button></div>
        </div>
        <div class="review-list">${reviewHtml}</div>
      `;
      resultsEl.style.display = 'block';
      document.getElementById('resultsRestartBtn').addEventListener('click', restartQuiz);
    }

    function restartQuiz() {
      state.questions = buildQuizData(RAW_QUESTIONS);
      state.index = 0;
      state.score = 0;
      state.answered = 0;
      state.locked = false;
      state.selected = null;
      state.review = [];
      renderQuestion();
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    nextBtn.addEventListener('click', nextStep);
    restartBtn.addEventListener('click', restartQuiz);

    renderQuestion();
  </script>
</body>
</html>
