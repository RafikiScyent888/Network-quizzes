<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Network+ – Day 8 | Saved Quiz Format</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: #0d1830;
      --panel-2: #122142;
      --line: #23365f;
      --text: #e9eefc;
      --muted: #9eb0d8;
      --accent: #7fb0ff;
      --accent-2: #b9d2ff;
      --good: #77d39a;
      --bad: #ff9b9b;
      --warn: #ffd37a;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      --radius: 18px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      --sans: Inter, Segoe UI, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--sans);
      background:
        radial-gradient(circle at top, rgba(127,176,255,0.08), transparent 28%),
        linear-gradient(180deg, #07101d 0%, #08111f 100%);
      color: var(--text);
      padding: 24px;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
    }

    .hero,
    .card,
    .results {
      background: linear-gradient(180deg, rgba(18,33,66,0.96), rgba(10,21,42,0.98));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 24px;
      margin-bottom: 18px;
    }

    .eyebrow {
      font-size: 0.86rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 2.2vw, 2.4rem);
      line-height: 1.15;
    }

    .subtitle {
      color: var(--muted);
      margin: 0;
      font-size: 1rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .stat {
      background: rgba(6, 15, 31, 0.55);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 6px;
    }

    .stat-value {
      font-weight: 800;
      font-size: 1.08rem;
    }

    .progress-shell {
      margin: 18px 0 16px;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 0.25s ease;
    }

    .card {
      padding: 22px;
    }

    .question-number {
      color: var(--accent);
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .question-text {
      font-size: 1.12rem;
      line-height: 1.55;
      margin-bottom: 18px;
      font-weight: 650;
    }

    .options {
      display: grid;
      gap: 12px;
    }

    .option {
      border: 1px solid var(--line);
      background: rgba(8, 17, 31, 0.78);
      border-radius: 14px;
      padding: 0;
      overflow: hidden;
      transition: border-color 0.18s ease, transform 0.18s ease, background 0.18s ease;
    }

    .option:hover {
      border-color: #4f72b8;
      transform: translateY(-1px);
    }

    .option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .option label {
      display: block;
      width: 100%;
      padding: 14px 16px;
      cursor: pointer;
    }

    .option-text {
      display: block;
      white-space: pre;
      font-family: var(--mono);
      font-size: 0.98rem;
      line-height: 1.4;
      color: var(--text);
    }

    .option.selected {
      border-color: var(--accent);
      background: rgba(18, 40, 78, 0.9);
    }

    .option.locked label {
      cursor: default;
    }

    .feedback {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid transparent;
      display: none;
      line-height: 1.45;
    }

    .feedback.good {
      display: block;
      background: rgba(49, 111, 71, 0.18);
      border-color: rgba(119, 211, 154, 0.34);
      color: #d9ffe6;
    }

    .feedback.bad {
      display: block;
      background: rgba(112, 44, 44, 0.18);
      border-color: rgba(255, 155, 155, 0.30);
      color: #ffe1e1;
    }

    details.explainer {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      overflow: hidden;
      display: none;
    }

    details.explainer.visible {
      display: block;
    }

    details.explainer summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      font-weight: 700;
      color: var(--accent-2);
    }

    details.explainer summary::-webkit-details-marker { display: none; }

    .explanation-body {
      padding: 0 16px 16px;
      color: #d8e3ff;
      line-height: 1.55;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .nav-left {
      color: var(--muted);
      font-size: 0.94rem;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #1a2e59, #14264c);
      color: var(--text);
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, opacity 0.16s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: #5f83c7;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .secondary {
      background: rgba(255,255,255,0.04);
    }

    .results {
      display: none;
      margin-top: 18px;
      padding: 24px;
    }

    .results h2 {
      margin-top: 0;
      margin-bottom: 8px;
    }

    .results p {
      color: var(--muted);
      line-height: 1.55;
    }

    .review-list {
      margin-top: 18px;
      display: grid;
      gap: 12px;
    }

    .review-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.03);
    }

    .review-item.good { border-color: rgba(119, 211, 154, 0.35); }
    .review-item.bad  { border-color: rgba(255, 155, 155, 0.28); }

    .review-q {
      font-weight: 700;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .review-line {
      color: var(--muted);
      font-family: var(--mono);
      white-space: pre-wrap;
      line-height: 1.5;
      margin-bottom: 6px;
    }

    @media (max-width: 720px) {
      body { padding: 14px; }
      .hero, .card, .results { padding: 18px; }
      .stats { grid-template-columns: 1fr; }
      .option-text { font-size: 0.92rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="eyebrow">Exam Mode</div>
      <h1>CompTIA Network+ Practice Quiz</h1>
      <p class="subtitle">Day 8 · Network Management &amp; IP Services · 30 questions · one at a time.</p>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">Format</div>
          <div class="stat-value">Saved quiz engine</div>
        </div>
        <div class="stat">
          <div class="stat-label">Flow</div>
          <div class="stat-value">Shuffle + Next</div>
        </div>
        <div class="stat">
          <div class="stat-label">Explanations</div>
          <div class="stat-value">Collapsible</div>
        </div>
      </div>
    </section>

    <section class="card" id="quizCard">
      <div class="progress-shell">
        <div class="progress-row">
          <div id="progressText">Question 1 of 30</div>
          <div id="scoreText">Score: 0 / 0</div>
        </div>
        <div class="progress-bar" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="question-number" id="questionNumber">Question 1</div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>

      <details class="explainer" id="explainer">
        <summary>Explanation</summary>
        <div class="explanation-body" id="explanationBody"></div>
      </details>

      <div class="nav">
        <div class="nav-left" id="navHint">Choose one answer.</div>
        <div>
          <button class="secondary" id="restartBtn" type="button">Restart</button>
          <button id="nextBtn" type="button" disabled>Next</button>
        </div>
      </div>
    </section>

    <section class="results" id="results"></section>
  </div>

  <script>
    const RAW_QUESTIONS = [
      {
        q: "When a network infrastructure device needs to transmit operational event notifications, anomaly indicators, and system-state messages to a centralized log-aggregation endpoint for long-term retention and correlation, which protocol is MOST commonly used?",
        a: ["SNMP", "Syslog", "NetFlow", "RADIUS"],
        c: 1,
        e: "Syslog is the standard protocol for sending event and status messages from routers, switches, firewalls, and servers to a centralized logging system."
      },
      {
        q: "A network operations center is implementing a standards-based monitoring framework where a centralized management station polls distributed agents for performance counters and device-health metrics stored in structured object hierarchies. Which component is responsible for initiating these polling operations?",
        a: ["SNMP Agent", "SNMP Manager", "MIB Browser", "Trap Receiver"],
        c: 1,
        e: "The SNMP manager initiates polling requests to SNMP agents and collects the returned management data."
      },
      {
        q: "An organization requires a device-management protocol that supports message integrity, authentication, and optional encryption to prevent unauthorized disclosure of management data in transit. Which version BEST satisfies this requirement?",
        a: ["SNMPv1", "SNMPv2c", "SNMPv3", "SNMPv2u"],
        c: 2,
        e: "SNMPv3 adds authentication, integrity checking, and optional encryption, making it the secure choice for management traffic."
      },
      {
        q: "A technician is reviewing a hierarchical database that defines object identifiers used for querying device performance, interface counters, and configuration parameters within a network-management ecosystem. What is this database called?",
        a: ["Syslog catalog", "Management Information Base (MIB)", "Routing table", "Access control list"],
        c: 1,
        e: "A MIB defines the managed objects and OIDs that SNMP tools use to read or write information on devices."
      },
      {
        q: "A workstation must automatically receive its IPv4 address, subnet mask, gateway, and DNS information during the boot process without manual configuration. Which IP service provides this functionality?",
        a: ["DNS", "DHCP", "NTP", "TFTP"],
        c: 1,
        e: "DHCP dynamically assigns IP configuration settings such as address, mask, gateway, and DNS servers."
      },
      {
        q: "A user reports that internal IP-based communication works normally, but any attempt to access external resources using domain names fails. Which IP service is MOST likely misconfigured or unavailable?",
        a: ["DHCP", "DNS", "NTP", "FTP"],
        c: 1,
        e: "If a device can reach resources by IP address but not by hostname, DNS resolution is the most likely issue."
      },
      {
        q: "A network administrator is creating a forward-lookup zone entry that maps a human-readable hostname to a corresponding IPv4 address. Which DNS record type should be created?",
        a: ["AAAA record", "CNAME record", "A record", "PTR record"],
        c: 2,
        e: "An A record maps a hostname to an IPv4 address."
      },
      {
        q: "A mail-routing architecture requires DNS entries that specify which hosts are authorized to receive inbound email for a domain. Which record type fulfills this requirement?",
        a: ["MX record", "PTR record", "NS record", "TXT record"],
        c: 0,
        e: "An MX record identifies the mail server that accepts email for a domain."
      },
      {
        q: "A technician is troubleshooting a reverse-lookup failure where an IP address cannot be resolved back to its associated hostname. Which DNS record type is required for this operation?",
        a: ["A record", "MX record", "PTR record", "CNAME record"],
        c: 2,
        e: "A PTR record is used for reverse DNS lookups, mapping an IP address back to a hostname."
      },
      {
        q: "A distributed network environment requires synchronized timestamps across routers, switches, servers, and security appliances to ensure accurate log correlation and event sequencing. Which protocol provides this capability?",
        a: ["NTP", "SNMP", "DNS", "DHCP"],
        c: 0,
        e: "NTP keeps clocks synchronized across networked devices so logs and events line up correctly."
      },
      {
        q: "A network engineer needs visibility into traffic patterns, including source and destination pairs, byte counts, and flow durations, to support capacity planning and anomaly detection. Which technology provides this level of flow-based analytics?",
        a: ["Port mirroring", "NetFlow or IPFIX", "Syslog", "SNMP traps"],
        c: 1,
        e: "NetFlow and IPFIX export flow-level metadata that helps analyze traffic behavior and utilization."
      },
      {
        q: "A security analyst needs to capture a real-time copy of ingress and egress traffic from a specific switch interface for packet-level inspection without disrupting production flows. Which switch feature should be used?",
        a: ["VLAN tagging", "Port mirroring (SPAN)", "QoS classification", "Link aggregation"],
        c: 1,
        e: "Port mirroring, often called SPAN, copies traffic from selected interfaces to a monitoring port for inspection."
      },
      {
        q: "A centralized monitoring platform continuously polls network devices, evaluates threshold conditions, and generates alerts when performance metrics exceed acceptable baselines. What type of system is being used?",
        a: ["Packet sniffer", "Configuration management system", "Network monitoring system (NMS)", "TFTP server"],
        c: 2,
        e: "An NMS monitors device health, gathers metrics, and alerts administrators when thresholds are crossed."
      },
      {
        q: "A network architect must ensure that latency-sensitive applications such as VoIP receive prioritized handling over best-effort traffic during periods of congestion. Which network feature accomplishes this?",
        a: ["Encryption", "Quality of Service (QoS)", "DHCP relay", "NAT"],
        c: 1,
        e: "QoS classifies and prioritizes time-sensitive traffic so it is handled before lower-priority traffic during congestion."
      },
      {
        q: "A host must automatically discover the presence of local routers and obtain default-gateway information using ICMP-based mechanisms rather than DHCP. Which feature provides this capability?",
        a: ["DHCP relay", "Proxy ARP", "ICMP Router Discovery", "NTP"],
        c: 2,
        e: "ICMP Router Discovery lets hosts learn about available routers and default-gateway information through ICMP messages."
      },
      {
        q: "A DHCP administrator is defining the range of IPv4 addresses that may be dynamically assigned to clients within a specific broadcast domain. What is this range called?",
        a: ["Lease pool", "DHCP scope", "Reservation table", "Address exclusion list"],
        c: 1,
        e: "A DHCP scope defines the assignable address range and related settings for a subnet."
      },
      {
        q: "A DHCP server must provide clients with the IP addresses of DNS resolvers during the lease process. Which DHCP option is used for this purpose?",
        a: ["Option 3", "Option 6", "Option 15", "Option 51"],
        c: 1,
        e: "DHCP Option 6 provides the addresses of DNS servers to clients."
      },
      {
        q: "A multi-subnet environment requires DHCP clients on remote VLANs to obtain addressing information from a centralized DHCP server. Which mechanism enables this communication?",
        a: ["DHCP snooping", "DHCP relay", "DHCP failover", "DHCPv6 prefix delegation"],
        c: 1,
        e: "DHCP relay forwards DHCP traffic between clients and servers that are on different subnets."
      },
      {
        q: "An enterprise needs a centralized platform to track IP address allocations, subnet utilization, and address-space planning across multiple sites. Which system provides this functionality?",
        a: ["DNS server", "IP Address Management (IPAM)", "RADIUS server", "Proxy server"],
        c: 1,
        e: "IPAM software tracks address usage, subnets, and allocation planning across the network."
      },
      {
        q: "A network team wants to ensure that router and switch configurations are automatically backed up, versioned, and retrievable for rollback after changes. Which type of system should be deployed?",
        a: ["Network monitoring system", "Configuration management system", "Syslog server", "Authentication server"],
        c: 1,
        e: "A configuration management system stores versions, automates backups, and supports rollback of device configurations."
      },
      {
        q: "A technician must remotely administer a network device using a secure, encrypted management session that protects credentials and configuration data. Which protocol should be used?",
        a: ["Telnet", "SSH", "FTP", "TFTP"],
        c: 1,
        e: "SSH provides secure, encrypted remote administration. Telnet does not encrypt session data."
      },
      {
        q: "A network engineer needs to validate DNS resolution behavior and view authoritative and non-authoritative responses for troubleshooting. Which tool is MOST appropriate?",
        a: ["ping", "tracert", "nslookup or dig", "ipconfig"],
        c: 2,
        e: "nslookup and dig query DNS servers directly and show detailed resolution data."
      },
      {
        q: "A security team wants to consolidate logs from firewalls, servers, and network devices into a single location for correlation and incident analysis. What is the PRIMARY benefit of this approach?",
        a: ["Automatic IP assignment", "Time synchronization", "Consolidated event logging and easier correlation", "Traffic shaping"],
        c: 2,
        e: "Centralized logging makes it much easier to correlate events across many systems during troubleshooting or incident response."
      },
      {
        q: "A workstation has the correct IP address and gateway but an incorrect subnet mask. Which symptom is MOST likely to occur?",
        a: ["Cannot communicate with any host", "Can communicate only with hosts incorrectly perceived as local", "Can communicate with all hosts normally", "DNS resolution will fail"],
        c: 1,
        e: "A bad subnet mask causes a host to misjudge which destinations are local and which require routing."
      },
      {
        q: "An IPv6-enabled network requires hosts to automatically configure their own addresses and default gateways without relying on a DHCPv6 server. Which mechanism provides this?",
        a: ["SLAAC", "NAT64", "DNSSEC", "IPAM"],
        c: 0,
        e: "SLAAC uses router advertisements to let IPv6 hosts self-configure addressing information."
      },
      {
        q: "A network administrator must ensure that real-time voice traffic receives higher priority than general web browsing during congestion. Which configuration accomplishes this?",
        a: ["Port mirroring", "QoS with traffic classification and queuing", "DHCP relay", "NTP authentication"],
        c: 1,
        e: "Traffic classification and queuing within QoS policies allow voice traffic to be prioritized over best-effort traffic such as web browsing."
      },
      {
        q: "A service provider contract specifies guaranteed uptime, latency thresholds, and response times for network services. What type of document defines these expectations?",
        a: ["Security policy", "Service Level Agreement (SLA)", "Change management plan", "Disaster recovery plan"],
        c: 1,
        e: "An SLA defines the agreed service levels, such as uptime, latency, and support response targets."
      },
      {
        q: "A monitoring system must receive unsolicited notifications from network devices when critical events occur, such as link failures or threshold violations. What are these notifications called?",
        a: ["Syslog messages", "SNMP traps", "NetFlow records", "ICMP redirects"],
        c: 1,
        e: "SNMP traps are unsolicited alerts sent by devices to notify a manager about specific events."
      },
      {
        q: "A technician needs to verify basic IP-layer reachability to a remote host. Which tool should be used?",
        a: ["ping", "tracert", "arp", "netstat"],
        c: 0,
        e: "ping uses ICMP echo requests and replies to verify Layer 3 reachability."
      },
      {
        q: "A user can successfully reach a remote server using its IP address but cannot resolve its hostname. What is the BEST first troubleshooting step?",
        a: ["Check the default gateway", "Check DNS server settings on the client", "Replace the network cable", "Change the subnet mask"],
        c: 1,
        e: "When connectivity by IP works but name resolution fails, DNS client settings are the best first place to check."
      }
    ];

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function padOptions(options) {
      const normalized = options.map(opt => opt.endsWith('.') ? opt : opt + '.');
      const maxLen = Math.max(...normalized.map(opt => opt.length));
      return normalized.map(opt => opt + '\u00A0'.repeat(maxLen - opt.length));
    }

    function buildQuizData(rawQuestions) {
      return shuffle(rawQuestions).map((q) => {
        const correct = q.a[q.c];
        const shuffledOptions = shuffle(q.a);
        const paddedOptions = padOptions(shuffledOptions);
        return {
          question: q.q,
          explanation: q.e,
          correct,
          options: shuffledOptions.map((text, idx) => ({
            raw: text,
            padded: paddedOptions[idx],
            isCorrect: text === correct
          }))
        };
      });
    }

    const state = {
      questions: buildQuizData(RAW_QUESTIONS),
      index: 0,
      score: 0,
      answered: 0,
      locked: false,
      selected: null,
      review: []
    };

    const questionNumber = document.getElementById('questionNumber');
    const questionText = document.getElementById('questionText');
    const optionsEl = document.getElementById('options');
    const feedbackEl = document.getElementById('feedback');
    const explainerEl = document.getElementById('explainer');
    const explanationBody = document.getElementById('explanationBody');
    const nextBtn = document.getElementById('nextBtn');
    const restartBtn = document.getElementById('restartBtn');
    const progressText = document.getElementById('progressText');
    const scoreText = document.getElementById('scoreText');
    const progressFill = document.getElementById('progressFill');
    const navHint = document.getElementById('navHint');
    const quizCard = document.getElementById('quizCard');
    const resultsEl = document.getElementById('results');

    function updateHeader() {
      progressText.textContent = `Question ${state.index + 1} of ${state.questions.length}`;
      scoreText.textContent = `Score: ${state.score} / ${state.answered}`;
      progressFill.style.width = `${(state.index / state.questions.length) * 100}%`;
    }

    function renderQuestion() {
      const item = state.questions[state.index];
      state.locked = false;
      state.selected = null;

      updateHeader();
      resultsEl.style.display = 'none';
      quizCard.style.display = 'block';

      questionNumber.textContent = `Question ${state.index + 1}`;
      questionText.textContent = item.question;
      feedbackEl.className = 'feedback';
      feedbackEl.textContent = '';
      explanationBody.textContent = item.explanation;
      explainerEl.className = 'explainer';
      explainerEl.open = false;
      nextBtn.disabled = true;
      nextBtn.textContent = state.index === state.questions.length - 1 ? 'Finish' : 'Next';
      navHint.textContent = 'Choose one answer.';

      optionsEl.innerHTML = '';

      item.options.forEach((option, idx) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'option';

        const input = document.createElement('input');
        input.type = 'radio';
        input.name = `q-${state.index}`;
        input.id = `q-${state.index}-${idx}`;

        const label = document.createElement('label');
        label.htmlFor = input.id;

        const text = document.createElement('span');
        text.className = 'option-text';
        text.textContent = `${String.fromCharCode(65 + idx)}) ${option.padded}`;

        label.appendChild(text);
        wrapper.appendChild(input);
        wrapper.appendChild(label);

        wrapper.addEventListener('click', () => {
          if (state.locked) return;
          [...optionsEl.children].forEach(el => el.classList.remove('selected'));
          wrapper.classList.add('selected');
          state.selected = option;
          nextBtn.disabled = false;
          navHint.textContent = 'Answer locked after you click Next.';
        });

        optionsEl.appendChild(wrapper);
      });
    }

    function lockAndGrade() {
      if (state.locked || !state.selected) return;
      const item = state.questions[state.index];
      state.locked = true;
      state.answered += 1;

      const isCorrect = state.selected.isCorrect;
      if (isCorrect) state.score += 1;

      feedbackEl.className = `feedback ${isCorrect ? 'good' : 'bad'}`;
      feedbackEl.textContent = isCorrect
        ? 'Correct. That choice best fits the objective tested here.'
        : 'Not this one. Focus on the protocol or service role being described, then compare what each option actually does.';

      explainerEl.className = 'explainer visible';
      navHint.textContent = isCorrect
        ? 'Review the explanation, then move to the next question.'
        : 'Open the explanation, then move to the next question.';

      [...optionsEl.children].forEach((el) => el.classList.add('locked'));

      state.review.push({
        question: item.question,
        chosen: state.selected.raw,
        correct: item.correct,
        explanation: item.explanation,
        isCorrect
      });

      scoreText.textContent = `Score: ${state.score} / ${state.answered}`;
      nextBtn.textContent = state.index === state.questions.length - 1 ? 'Finish' : 'Next';
    }

    function nextStep() {
      if (!state.locked) {
        lockAndGrade();
        return;
      }

      if (state.index < state.questions.length - 1) {
        state.index += 1;
        renderQuestion();
      } else {
        renderResults();
      }
    }

    function renderResults() {
      quizCard.style.display = 'none';
      progressFill.style.width = '100%';
      const pct = Math.round((state.score / state.questions.length) * 100);

      const summary = pct >= 90
        ? 'Strong pass. Your recall on these services and management concepts is in good shape.'
        : pct >= 75
          ? 'Solid work. A quick review of missed protocol roles should tighten this up fast.'
          : pct >= 60
            ? 'Decent base. Revisit service purpose, common ports, and what each tool actually measures or configures.'
            : 'Good checkpoint. Slow down on the wording and map each clue to the exact protocol, feature, or document.';

      const reviewHtml = state.review.map((item, idx) => `
        <div class="review-item ${item.isCorrect ? 'good' : 'bad'}">
          <div class="review-q">${idx + 1}. ${escapeHtml(item.question)}</div>
          <div class="review-line">Your answer: ${escapeHtml(item.chosen)}.</div>
          <div class="review-line">Correct answer: ${escapeHtml(item.correct)}.</div>
          <div class="review-line">Why: ${escapeHtml(item.explanation)}</div>
        </div>
      `).join('');

      resultsEl.innerHTML = `
        <h2>Quiz complete</h2>
        <p><strong>Final score:</strong> ${state.score} / ${state.questions.length} (${pct}%).</p>
        <p>${summary}</p>
        <div class="nav" style="margin-top:16px;">
          <div class="nav-left">Per-load shuffle is active, so a restart gives a fresh order.</div>
          <div><button id="resultsRestartBtn" type="button">Restart quiz</button></div>
        </div>
        <div class="review-list">${reviewHtml}</div>
      `;
      resultsEl.style.display = 'block';
      document.getElementById('resultsRestartBtn').addEventListener('click', restartQuiz);
    }

    function restartQuiz() {
      state.questions = buildQuizData(RAW_QUESTIONS);
      state.index = 0;
      state.score = 0;
      state.answered = 0;
      state.locked = false;
      state.selected = null;
      state.review = [];
      renderQuestion();
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    nextBtn.addEventListener('click', nextStep);
    restartBtn.addEventListener('click', restartQuiz);

    renderQuestion();
  </script>
</body>
</html>
