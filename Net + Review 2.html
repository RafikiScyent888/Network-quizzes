<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Network+ 45-Question Practice Quiz - Saved Format</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: #0d1b2f;
      --panel-2: #10223c;
      --text: #e8eefc;
      --muted: #9fb0d1;
      --accent: #7fb3ff;
      --accent-2: #9ad0ff;
      --good: #7ee081;
      --bad: #ff8f8f;
      --border: #223a63;
      --shadow: 0 10px 30px rgba(0,0,0,.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #06101d 0%, #0b1830 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    .wrap { max-width: 980px; margin: 0 auto; }
    .card {
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 24px;
    }
    h1 { margin: 0 0 6px; font-size: 2rem; }
    .sub { color: var(--muted); margin-bottom: 18px; }
    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }
    .pill {
      background: rgba(127, 179, 255, 0.08);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.95rem;
    }
    .progress-wrap {
      width: 100%;
      height: 12px;
      background: #07101e;
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
      margin: 16px 0 24px;
    }
    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width .25s ease;
    }
    .question-number {
      color: var(--accent-2);
      font-size: 0.95rem;
      margin-bottom: 8px;
      letter-spacing: .03em;
    }
    .question-text {
      font-size: 1.18rem;
      line-height: 1.55;
      margin-bottom: 20px;
      font-weight: 700;
    }
    .options { display: grid; gap: 12px; }
    .option {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      cursor: pointer;
      transition: transform .08s ease, border-color .15s ease, background .15s ease;
    }
    .option:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
      background: rgba(127,179,255,.07);
    }
    .option input { margin-top: 3px; transform: scale(1.15); }
    .option code {
      font-family: "Courier New", Courier, monospace;
      white-space: pre;
      color: var(--text);
      font-size: 0.98rem;
      line-height: 1.5;
    }
    .feedback {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 12px;
      display: none;
      font-weight: 700;
    }
    .feedback.good {
      display: block;
      background: rgba(126, 224, 129, 0.10);
      border: 1px solid rgba(126, 224, 129, 0.35);
      color: var(--good);
    }
    .feedback.bad {
      display: block;
      background: rgba(255, 143, 143, 0.10);
      border: 1px solid rgba(255, 143, 143, 0.35);
      color: var(--bad);
    }
    details {
      margin-top: 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      overflow: hidden;
      display: none;
    }
    details.show { display: block; }
    summary {
      cursor: pointer;
      padding: 12px 14px;
      color: var(--accent-2);
      font-weight: 700;
      user-select: none;
    }
    .explanation {
      padding: 0 14px 14px;
      color: var(--text);
      line-height: 1.55;
    }
    .controls { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
    button {
      appearance: none;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, #17335d 0%, #122949 100%);
      color: var(--text);
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    button[disabled] { opacity: .5; cursor: not-allowed; }
    .secondary { background: linear-gradient(180deg, #101c31 0%, #0b1424 100%); }
    .result {
      display: none;
      margin-top: 18px;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(127,179,255,.07);
    }
    .result.show { display: block; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">

        <button id="restartBtn" class="secondary">Restart</button>

      <div class="result" id="resultBox"></div>
    </div>
  </div>

        explanation: "6to4 encapsulates Internet Protocol version 6 (IPv6) packets inside Internet Protocol version 4 (IPv4)."
    },
    {

        answers: [

            { text: "tracert", correct: false },
            { text: "ipconfig", correct: false }
        ],
        explanation: "Ping tests Internet Control Message Protocol (ICMP) reachability."
    },
    {
        q: "A network administrator must prevent unauthorized Dynamic Host Configuration Protocol (DHCP) servers from assigning IP addresses. Which feature should be enabled?",
        answers: [
            { text: "Dynamic Host Configuration Protocol (DHCP) snooping", correct: true },
            { text: "Port mirroring", correct: false },
            { text: "Quality of Service (QoS)", correct: false },
            { text: "Network Address Translation (NAT)", correct: false }
        ],
        explanation: "Dynamic Host Configuration Protocol (DHCP) snooping blocks untrusted Dynamic Host Configuration Protocol (DHCP) responses."
    },
    {
        q: "A technician needs to identify which virtual local area network (VLAN) a specific switch port belongs to. Which command is MOST useful?",
        answers: [

];

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function ensurePeriod(s) {
  s = String(s).trim();
  return /[.!?]$/.test(s) ? s : s + ".";
}

function padOptions(options) {
  const normalized = options.map(ensurePeriod);
  const maxLen = Math.max(...normalized.map(s => s.length));
  return normalized.map(s => s + "\u00A0".repeat(maxLen - s.length));
}

let state = {
  questions: [],
  index: 0,
  score: 0,
  answered: false
};

function prepareQuestions() {
  const qList = QUESTIONS.map(q => {
    const answers = q.answers.map(a => ({
      ans: ensurePeriod(a.text),
      isCorrect: a.correct
    }));
    shuffle(answers);
    return {
      q: q.q,
      e: q.explanation,
      answers
    };
  });
  shuffle(qList);
  return qList;
}

function renderQuestion() {
  const quizArea = document.getElementById("quizArea");
  const progressBar = document.getElementById("progressBar");
  const scorePill = document.getElementById("scorePill");
  const progressPill = document.getElementById("progressPill");
  const nextBtn = document.getElementById("nextBtn");
  const resultBox = document.getElementById("resultBox");

  nextBtn.disabled = true;
  resultBox.classList.remove("show");

  if (state.index >= state.questions.length) {
    quizArea.innerHTML = "";
    progressBar.style.width = "100%";
    scorePill.textContent = `Score: ${state.score} / ${state.questions.length}`;
    progressPill.textContent = `Completed: ${state.questions.length} / ${state.questions.length}`;
    resultBox.innerHTML = `<strong>Finished.</strong><br>Your score: <strong>${state.score} / ${state.questions.length}</strong>.`;
    resultBox.classList.add("show");
    return;
  }

  const item = state.questions[state.index];
  const displayAnswers = padOptions(item.answers.map(x => x.ans));

  progressBar.style.width = `${(state.index / state.questions.length) * 100}%`;
  scorePill.textContent = `Score: ${state.score} / ${state.index}`;
  progressPill.textContent = `Question ${state.index + 1} / ${state.questions.length}`;

  quizArea.innerHTML = `
    <div class="question-number">Question ${state.index + 1}</div>
    <div class="question-text">${item.q}</div>
    <div class="options">
      ${item.answers.map((obj, i) => `
        <label class="option">
          <input type="radio" name="answer" value="${i}">
          <code>${String.fromCharCode(65 + i)}) ${displayAnswers[i]}</code>
        </label>
      `).join("")}
    </div>
    <div id="feedback" class="feedback"></div>
    <details id="explainBox">
      <summary>Explanation</summary>
      <div class="explanation">${item.e}</div>
    </details>
  `;

  state.answered = false;

  document.querySelectorAll('input[name="answer"]').forEach((input) => {
    input.addEventListener("change", () => {
      if (state.answered) return;
      state.answered = true;
      const chosen = Number(input.value);
      const correct = item.answers[chosen].isCorrect;
      const feedback = document.getElementById("feedback");
      const explainBox = document.getElementById("explainBox");

      if (correct) {
        state.score += 1;
        feedback.textContent = "Correct.";
        feedback.className = "feedback good";
      } else {
        feedback.textContent = "Incorrect.";
        feedback.className = "feedback bad";
      }

      explainBox.classList.add("show");
      nextBtn.disabled = false;

      document.querySelectorAll('input[name="answer"]').forEach((el) => el.disabled = true);
      document.getElementById("scorePill").textContent = `Score: ${state.score} / ${state.index + 1}`;
    });
  });
}

function restartQuiz() {
  state.questions = prepareQuestions();
  state.index = 0;
  state.score = 0;
  state.answered = false;
  renderQuestion();
}

document.getElementById("nextBtn").addEventListener("click", () => {
  if (!state.answered) return;
  state.index += 1;
  renderQuestion();
});

document.getElementById("restartBtn").addEventListener("click", restartQuiz);

restartQuiz();
</script>
