<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Network+ IPv4 Services & Ports Quiz</title>
<style>
  :root {
    --bg1:#06111f;
    --bg2:#0b1c33;
    --panel:#102544;
    --panel-2:#0d203a;
    --line:#2a4770;
    --text:#eaf2ff;
    --muted:#9eb4d4;
    --accent:#78a6ff;
    --good:#12351f;
    --good-line:#4dd082;
    --bad:#35161d;
    --bad-line:#ff7a90;
    --info:#102b4e;
    --info-line:#79b8ff;
    --btn:#18355f;
    --btn-hover:#204473;
  }
  * { box-sizing:border-box; }
  body {
    margin:0;
    padding:24px;
    font-family: "Segoe UI", Tahoma, sans-serif;
    color:var(--text);
    background: radial-gradient(circle at top, #17345f 0%, var(--bg2) 34%, var(--bg1) 100%);
    min-height:100vh;
  }
  .wrap { max-width:980px; margin:0 auto; }
  .card {
    background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
    border:1px solid rgba(138,176,255,0.20);
    border-radius:22px;
    box-shadow:0 18px 50px rgba(0,0,0,0.35);
    overflow:hidden;
  }
  .top {
    padding:22px 24px 16px;
    border-bottom:1px solid rgba(138,176,255,0.16);
    background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.00));
  }
  h1 { margin:0 0 8px; font-size:1.6rem; line-height:1.25; letter-spacing:0.2px; }
  .sub { color:var(--muted); font-size:0.98rem; line-height:1.45; }
  .statusbar {
    display:grid;
    grid-template-columns:1fr auto auto;
    gap:12px;
    align-items:center;
    margin-top:16px;
  }
  .progress-shell {
    height:12px;
    background:#0a1730;
    border:1px solid rgba(138,176,255,0.18);
    border-radius:999px;
    overflow:hidden;
  }
  .progress-fill {
    height:100%;
    width:0%;
    background:linear-gradient(90deg, #6a9cff, #8fd2ff);
    transition:width 0.25s ease;
  }
  .pill {
    border:1px solid rgba(138,176,255,0.22);
    background:rgba(255,255,255,0.03);
    border-radius:999px;
    padding:8px 12px;
    font-size:0.92rem;
    color:var(--text);
    white-space:nowrap;
  }
  .main { padding:24px; }
  .question-num {
    color:#8fb2f1;
    font-size:0.92rem;
    text-transform:uppercase;
    letter-spacing:0.12em;
    margin-bottom:10px;
  }
  .question { font-size:1.2rem; line-height:1.55; margin:0 0 18px; }
  .answers { display:grid; gap:12px; }
  .answer-btn {
    width:100%;
    text-align:left;
    border:1px solid var(--line);
    border-radius:16px;
    background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
    color:var(--text);
    padding:14px 16px;
    cursor:pointer;
    transition:transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
    font:600 0.98rem/1.45 "Consolas","Menlo","Monaco","Courier New",monospace;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:clip;
  }
  .answer-btn:hover:not(:disabled) {
    transform:translateY(-1px);
    border-color:#86adff;
    background:rgba(255,255,255,0.055);
  }
  .answer-btn:disabled { cursor:default; }
  .answer-btn.correct {
    background:var(--good);
    border-color:var(--good-line);
    color:#effff4;
  }
  .answer-btn.incorrect {
    background:var(--bad);
    border-color:var(--bad-line);
    color:#fff1f3;
  }
  .answer-btn.reveal-correct {
    background:#102d20;
    border-color:#55d88c;
    color:#effff4;
  }
  .feedback {
    margin-top:16px;
    padding:14px 16px;
    border-radius:16px;
    display:none;
    border:1px solid transparent;
    line-height:1.5;
  }
  .feedback.good { display:block; background:var(--good); border-color:var(--good-line); }
  .feedback.bad { display:block; background:var(--bad); border-color:var(--bad-line); }
  details {
    margin-top:14px;
    border:1px solid rgba(138,176,255,0.18);
    border-radius:16px;
    background:var(--info);
    overflow:hidden;
  }
  summary {
    cursor:pointer;
    list-style:none;
    padding:14px 16px;
    font-weight:700;
  }
  summary::-webkit-details-marker { display:none; }
  .explanation { padding:0 16px 16px; color:#e4efff; line-height:1.55; }
  .controls { display:flex; gap:12px; flex-wrap:wrap; margin-top:20px; }
  .btn {
    border:none;
    border-radius:14px;
    padding:12px 16px;
    font-weight:700;
    color:white;
    background:var(--btn);
    cursor:pointer;
    transition:background 0.15s ease, transform 0.12s ease;
  }
  .btn:hover { background:var(--btn-hover); transform:translateY(-1px); }
  .btn.secondary {
    background:transparent;
    border:1px solid rgba(138,176,255,0.25);
    color:var(--text);
  }
  .btn[disabled] { opacity:0.55; cursor:not-allowed; transform:none; }
  .result { display:none; }
  .result.show { display:block; }
  .score-big { font-size:2rem; font-weight:800; margin:0 0 8px; }
  .review-list { margin-top:18px; display:grid; gap:14px; }
  .review-item {
    border:1px solid rgba(138,176,255,0.18);
    background:rgba(255,255,255,0.03);
    border-radius:18px;
    padding:16px;
  }
  .review-item h3 { margin:0 0 10px; font-size:1rem; line-height:1.45; }
  .tag {
    display:inline-block;
    font-size:0.82rem;
    border-radius:999px;
    padding:6px 10px;
    margin-bottom:10px;
    border:1px solid rgba(255,255,255,0.16);
  }
  .tag.good { background:var(--good); border-color:var(--good-line); }
  .tag.bad { background:var(--bad); border-color:var(--bad-line); }
  .mini {
    font:600 0.95rem/1.45 "Consolas","Menlo","Monaco","Courier New",monospace;
    color:#eef4ff;
    margin:4px 0;
    white-space:normal;
  }
  @media (max-width: 780px) {
    body { padding:14px; }
    .statusbar { grid-template-columns:1fr; }
    .answer-btn { white-space:normal; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="top">
      <h1>Network+ Networking Appliances, Applications & Functions Quiz</h1>
      <div class="sub">Scenario-based exam mode with one question at a time, shuffled options, collapsible explanations, and expanded acronyms in the explanations.</div>
      <div class="statusbar">
        <div class="progress-shell"><div id="progressFill" class="progress-fill"></div></div>
        <div class="pill" id="progressText">Question 1 of 1</div>
        <div class="pill" id="scoreText">Score 0/0</div>
      </div>
    </div>

    <div class="main">
      <section id="quizPanel">
        <div class="question-num" id="questionNum"></div>
        <h2 class="question" id="questionText"></h2>
        <div class="answers" id="answers"></div>
        <div id="feedback" class="feedback"></div>
        <details id="explainBox">
          <summary>Explanation</summary>
          <div id="explanationText" class="explanation"></div>
        </details>
        <div class="controls">
          <button id="nextBtn" class="btn" disabled>Next</button>
          <button id="restartBtn" class="btn secondary">Restart Quiz</button>
        </div>
      </section>

      <section id="resultPanel" class="result">
        <p class="score-big" id="finalScore"></p>
        <div class="sub" id="finalMsg"></div>
        <div class="controls">
          <button id="retryBtn" class="btn">Retry Quiz</button>
        </div>
        <div class="review-list" id="reviewList"></div>
      </section>
    </div>
  </div>
</div>

<script>
const sourceQuestions = [
  {
    "q": "A help desk technician notices several new workstations received IP addresses automatically after being connected to the office network. Which service most likely provided those addresses?",

  },
  {

  {
    "q": "A laptop knows the IPv4 address of a printer on the same subnet but still needs the hardware address before sending the frame. Which protocol handles that step?",
    "choices": [
      "Address Resolution Protocol (ARP).",

      "Internet Control Message Protocol (ICMP).",

    ],
    "correct": 0,
    "exp": "Address Resolution Protocol (ARP) resolves an IPv4 address to a Media Access Control (MAC) address on the local network segment."
  },
  {
    "q": "Several switches and routers show mismatched timestamps in the logs, making troubleshooting difficult. Which service should be checked first?",
    "choices": [
      "Network Time Protocol (NTP).",
      "Domain Name System (DNS).",
      "Dynamic Host Configuration Protocol (DHCP).",
      "Simple Network Management Protocol (SNMP)."
    ],
    "correct": 0,
    "exp": "Network Time Protocol (NTP) synchronizes device clocks so logs and alerts line up correctly across the network."
  },
  {
    "q": "A small office uses private IPv4 addressing internally but still reaches the internet through one public address on the edge device. Which service makes that possible?",
    "choices": [
      "Network Address Translation (NAT).",
      "Address Resolution Protocol (ARP).",
      "Internet Control Message Protocol (ICMP).",
      "Domain Name System (DNS)."
    ],
    "correct": 0,
    "exp": "Network Address Translation (NAT) translates private addresses to a public address so internal hosts can communicate externally."
  },
  {
    "q": "A technician runs ping to verify whether a remote device responds across the network. Which protocol is ping using?",
    "choices": [
      "Internet Control Message Protocol (ICMP).",
      "Transmission Control Protocol (TCP).",
      "User Datagram Protocol (UDP).",
      "Simple Network Management Protocol (SNMP)."
    ],
    "correct": 0,
    "exp": "Ping uses Internet Control Message Protocol (ICMP) Echo Request and Echo Reply messages to test reachability."
  },
  {
    "q": "A client has just joined a network and is trying to locate a server that can lease it an address. Which Dynamic Host Configuration Protocol message is sent first?",
    "choices": [
      "DHCPDISCOVER.",
      "DHCPOFFER.",
      "DHCPREQUEST.",
      "DHCPACK."
    ],
    "correct": 0,
    "exp": "The first message is DHCPDISCOVER, which is usually broadcast so the client can find available Dynamic Host Configuration Protocol servers."
  },
  {
    "q": "An administrator is performing a reverse lookup to identify the hostname associated with an IP address. Which Domain Name System record is used?",
    "choices": [
      "Pointer (PTR) record.",
      "A record.",
      "Mail Exchange (MX) record.",
      "Canonical Name (CNAME) record."
    ],
    "correct": 0,
    "exp": "A Pointer (PTR) record maps an IP address back to a hostname for reverse Domain Name System lookups."
  },
  {
    "q": "A network engineer needs a lightweight method to transfer a boot image to a device during startup, without the overhead of a full-featured file transfer service. Which protocol is the best fit?",
    "choices": [
      "Trivial File Transfer Protocol (TFTP).",
      "File Transfer Protocol (FTP).",
      "SSH File Transfer Protocol (SFTP).",
      "Hypertext Transfer Protocol Secure (HTTPS)."
    ],
    "correct": 0,
    "exp": "Trivial File Transfer Protocol (TFTP) is a simple User Datagram Protocol (UDP)-based transfer service often used for boot files and device configurations."
  },
  {
    "q": "A network operations team wants to poll routers and switches and read management data from their Management Information Bases. Which protocol should be used?",

    "choices": [

    "choices": [

    "correct": 0,
    "exp": "Telnet uses Transmission Control Protocol (TCP) port 23, but it is considered insecure because it does not encrypt traffic."

  {
    "q": "A mail relay is forwarding outbound email between servers. Which standard port is most closely associated with Simple Mail Transfer Protocol?",
    "choices": [
      "25.",

    ],
    "correct": 0,
    "exp": "Simple Mail Transfer Protocol (SMTP) commonly uses Transmission Control Protocol (TCP) port 25 for server-to-server email transfer."
  },
  {
    "q": "A user downloads messages from a mailbox to a local client and often removes them from the server afterward. Which protocol and port best match that behavior?",
    "choices": [
      "Post Office Protocol version 3 (POP3) on port 110.",
      "Internet Message Access Protocol (IMAP) on port 143.",
      "Simple Mail Transfer Protocol (SMTP) on port 25.",
      "Lightweight Directory Access Protocol (LDAP) on port 389."

    "correct": 0,
    "exp": "Post Office Protocol version 3 (POP3) uses Transmission Control Protocol (TCP) port 110 and is associated with downloading mail to a local client."
  },
  {
    "q": "A user needs to keep email synchronized across a laptop and phone while leaving messages stored on the server. Which protocol and port best fit that need?",
    "choices": [
      "Internet Message Access Protocol (IMAP) on port 143.",
      "Post Office Protocol version 3 (POP3) on port 110.",
      "Simple Mail Transfer Protocol (SMTP) on port 25.",
      "Secure Shell (SSH) on port 22."
    ],
    "correct": 0,
    "exp": "Internet Message Access Protocol (IMAP) uses Transmission Control Protocol (TCP) port 143 and is designed for server-based mail access across multiple devices."
  },
  {
    "q": "A support tech must remotely control a Windows workstation through the graphical desktop interface. Which port is usually involved for Remote Desktop Protocol?",
    "choices": [
      "3389.",
      "5900.",
      "22.",
      "443."
    ],
    "correct": 0,
    "exp": "Remote Desktop Protocol (RDP) uses Transmission Control Protocol (TCP) port 3389 by default."
  },
  {
    "q": "A firewall rule must allow the control channel for File Transfer Protocol sessions. Which port is the standard match?",
    "choices": [
      "21.",
      "20.",
      "69.",
      "22."
    ],
    "correct": 0,
    "exp": "File Transfer Protocol (FTP) traditionally uses Transmission Control Protocol (TCP) port 21 for the control channel."
  },
  {
    "q": "An engineer is reviewing an older File Transfer Protocol deployment and needs to identify the traditional data channel port. Which port is correct?",
    "choices": [
      "20.",
      "21.",
      "69.",
      "110."
    ],
    "correct": 0,
    "exp": "In traditional active File Transfer Protocol (FTP), port 20 is used for the data channel and port 21 is used for the control channel."
  },
  {
    "q": "A technician is imaging a device that boots from the network using a very small file transfer service. Which port is associated with Trivial File Transfer Protocol?",
    "choices": [
      "69.",
      "20.",
      "21.",
      "161."
    ],
    "correct": 0,
    "exp": "Trivial File Transfer Protocol (TFTP) uses User Datagram Protocol (UDP) port 69."
  },
  {
    "q": "A monitoring platform is polling a managed switch for counters and interface statistics. Which port is typically used by Simple Network Management Protocol queries?",
    "choices": [
      "161.",
      "162.",
      "23.",
      "514."
    ],
    "correct": 0,
    "exp": "Simple Network Management Protocol (SNMP) usually uses User Datagram Protocol (UDP) port 161 for queries and management requests."
  },
  {
    "q": "A managed device sends an unsolicited alert to the monitoring server after an interface fails. Which port is associated with a Simple Network Management Protocol trap?",
    "choices": [
      "162.",
      "161.",
      "443.",
      "514."
    ],
    "correct": 0,
    "exp": "Simple Network Management Protocol (SNMP) trap messages are commonly sent to User Datagram Protocol (UDP) port 162."

  {
    "q": "An administrator needs to query a directory service for users and groups using the standard unencrypted port. Which port aligns with Lightweight Directory Access Protocol?",
    "choices": [
      "389.",

    ],
    "correct": 0,
    "exp": "Lightweight Directory Access Protocol (LDAP) commonly uses port 389. Secure LDAP traffic typically uses a different port."

  {

  {

    ],

  {

    ],

  },
  {

    "choices": [

];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function letter(index) {
  return ["A", "B", "C", "D"][index] || "?";
}

function nbspPad(text, target) {
  const bare = text.replace(/ /g, "\u00A0");
  const diff = Math.max(0, target - text.length);
  return bare + "\u00A0".repeat(diff);
}

function buildQuiz() {
  return shuffle(sourceQuestions).map((q) => {
    const options = q.choices.map((text, idx) => ({ text, correct: idx === q.correct }));
    const shuffled = shuffle(options);
    const maxLen = Math.max(...shuffled.map(o => o.text.length));
    return {
      q: q.q,
      explanation: q.exp,
      options: shuffled.map((opt, idx) => ({
        label: `${letter(idx)}) ${nbspPad(opt.text, maxLen)}`,
        text: opt.text,
        correct: opt.correct
      }))
    };
  });
}

let quiz = buildQuiz();
let current = 0;
let score = 0;
let locked = false;
let history = [];

const quizPanel = document.getElementById("quizPanel");
const resultPanel = document.getElementById("resultPanel");
const questionNum = document.getElementById("questionNum");
const questionText = document.getElementById("questionText");
const answersDiv = document.getElementById("answers");
const feedback = document.getElementById("feedback");
const explainBox = document.getElementById("explainBox");
const explanationText = document.getElementById("explanationText");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const retryBtn = document.getElementById("retryBtn");
const progressFill = document.getElementById("progressFill");
const progressText = document.getElementById("progressText");
const scoreText = document.getElementById("scoreText");
const finalScore = document.getElementById("finalScore");
const finalMsg = document.getElementById("finalMsg");
const reviewList = document.getElementById("reviewList");

function updateHeader() {
  const answered = history.length;
  const pct = ((current) / quiz.length) * 100;
  progressFill.style.width = `${pct}%`;
  progressText.textContent = `Question ${Math.min(current + 1, quiz.length)} of ${quiz.length}`;
  scoreText.textContent = `Score ${score}/${answered}`;
}

function renderQuestion() {
  locked = false;
  nextBtn.disabled = true;
  feedback.className = "feedback";
  feedback.textContent = "";
  explainBox.open = false;
  explanationText.textContent = "";
  answersDiv.innerHTML = "";

  const item = quiz[current];
  questionNum.textContent = `Question ${current + 1}`;
  questionText.textContent = item.q;
  explanationText.textContent = item.explanation;

  item.options.forEach((opt) => {
    const btn = document.createElement("button");
    btn.className = "answer-btn";
    btn.innerHTML = opt.label;
    btn.addEventListener("click", () => selectAnswer(btn, opt, item.options));
    answersDiv.appendChild(btn);
  });

  updateHeader();
}

function selectAnswer(clickedBtn, opt, options) {
  if (locked) return;
  locked = true;
  const buttons = [...answersDiv.querySelectorAll(".answer-btn")];
  buttons.forEach(b => b.disabled = true);

  const correctOption = options.find(o => o.correct);
  const correctIndex = options.findIndex(o => o.correct);

  if (opt.correct) {
    score += 1;
    clickedBtn.classList.add("correct");
    feedback.className = "feedback good";
    feedback.textContent = `Correct. ${letter(correctIndex)} is the best fit for this service, protocol, or port question.`;
  } else {
    clickedBtn.classList.add("incorrect");
    const correctBtn = buttons[correctIndex];
    if (correctBtn) correctBtn.classList.add("reveal-correct");
    feedback.className = "feedback bad";
    feedback.textContent = `Not this one. The best answer is ${letter(correctIndex)} because it matches the service, protocol, or port more precisely.`;
  }

  history.push({
    question: quiz[current].q,
    chosen: opt.text,
    correct: correctOption.text,
    wasCorrect: opt.correct,
    explanation: quiz[current].explanation
  });

  explainBox.open = true;
  nextBtn.disabled = false;
  scoreText.textContent = `Score ${score}/${history.length}`;
}

function showResults() {
  progressFill.style.width = "100%";
  progressText.textContent = `Completed ${quiz.length} of ${quiz.length}`;
  scoreText.textContent = `Score ${score}/${quiz.length}`;
  quizPanel.style.display = "none";
  resultPanel.classList.add("show");

  const pct = Math.round((score / quiz.length) * 100);
  finalScore.textContent = `Final Score: ${score}/${quiz.length} (${pct}%)`;

  let msg = "Keep drilling what each service does, what each protocol is for, and which ports go with the common ones.";
  if (pct >= 90) msg = "Strong work. Your service recognition and common port matching look exam-ready.";
  else if (pct >= 75) msg = "Nice job. A few service and port near-misses still need tightening.";
  else if (pct >= 60) msg = "Good foundation. Focus on protocol purpose, service behavior, and the high-value common ports.";
  finalMsg.textContent = msg;

  reviewList.innerHTML = history.map((item, idx) => `
    <div class="review-item">
      <div class="tag ${item.wasCorrect ? "good" : "bad"}">${item.wasCorrect ? "Correct" : "Review Needed"}</div>
      <h3>${idx + 1}. ${item.question}</h3>
      <div class="mini">Your answer: ${item.chosen}</div>
      <div class="mini">Best answer: ${item.correct}</div>
      <div class="sub">${item.explanation}</div>
    </div>
  `).join("");
}

nextBtn.addEventListener("click", () => {
  current += 1;
  if (current >= quiz.length) showResults();
  else renderQuestion();
});

function restartQuiz() {
  quiz = buildQuiz();
  current = 0;
  score = 0;
  locked = false;
  history = [];
  resultPanel.classList.remove("show");
  quizPanel.style.display = "block";
  renderQuestion();
}

restartBtn.addEventListener("click", restartQuiz);
retryBtn.addEventListener("click", restartQuiz);

renderQuestion();
</script>
</body>
</html>
